        const makeWhiteTransparent = (imageSrc) => {
            return new Promise((resolve) => {
                const img = new Image();
                if (!imageSrc.startsWith('blob:')) {
                    img.crossOrigin = 'Anonymous';
                }
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d', { willReadFrequently: true });
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) {
                                data[i+3] = 0; 
                            } else if (data[i] > 220 && data[i+1] > 220 && data[i+2] > 220) {
                                data[i+3] = 100; 
                            }
                        }
                        ctx.putImageData(imageData, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch(e) {
                        console.warn("Błąd usuwania tła:", e);
                        resolve(imageSrc); 
                    }
                };
                img.onerror = () => resolve(imageSrc);
                img.src = imageSrc;
            });
        };

                                                </>
                                            ) : graphicLayout === 'bottom_center' ? (
                                                <img src={customImage} className="absolute bottom-[-2rem] left-1/2 -translate-x-1/2 w-[35rem] h-[35rem] object-contain drop-shadow-2xl" />
                                            ) : null}
                                        </div>
                                    )}

                                    {/* Znak wodny wersji darmowej */}
                                    {!isPremium && <div className="absolute inset-0 z-50 flex items-center justify-center opacity-[0.04] rotate-[-35deg] text-6xl font-black uppercase pointer-events-none select-none tracking-[2rem]">EDUGENERATOR.PL</div>}

                                    {/* Nagłówek Dyplomu */}
                                    <div className="z-20 relative pt-2 flex-shrink-0 space-y-2">
                                        <h1 style={{ 
                                            fontSize: `${textFormats.title.size}px`, 
                                            color: textFormats.title.color,
                                            fontWeight: textFormats.title.bold ? 'bold' : 'normal',
                                            fontStyle: textFormats.title.italic ? 'italic' : 'normal'
                                        }} className="tracking-[0.25em] uppercase leading-none drop-shadow-sm select-none break-words max-w-full">{diplomaTitle}</h1>
                                        
                                        <h3 style={{ 
                                            fontSize: `${textFormats.subtitle.size}px`, 
                                            color: textFormats.subtitle.color,
                                            fontWeight: textFormats.subtitle.bold ? 'bold' : 'normal',
                                            fontStyle: textFormats.subtitle.italic ? 'italic' : 'normal'
                                        }} className="opacity-80 uppercase tracking-widest min-h-[1.5em] select-none break-words max-w-full">{diplomaSubtitle}</h3>
                                    </div>

                                    {/* Szyba (Glassmorphism) - Elastyczna struktura zapobiegająca wychodzeniu tekstu */}
                                    <div 
                                        className="z-20 relative mx-auto flex flex-col items-center justify-center transition-all duration-300 py-6 px-8 md:py-10 md:px-14 rounded-[2rem] border border-white/40 shadow-xl my-auto flex-grow-0"
                                        style={{ 
                                            width: `${boxWidth}%`,
                                            transform: `translateY(${boxOffset}px)`, 
                                            backgroundColor: `rgba(255,255,255,${boxOpacity/100})`, 
                                            backdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*16}px)` : 'none',
                                            WebkitBackdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*16}px)` : 'none',
                                            boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.15)'
                                        }}
                                    >
                                        <h2 style={{ 
                                            fontSize: `${textFormats.name.size}px`, 
                                            color: textFormats.name.color,
                                            fontWeight: textFormats.name.bold ? 'bold' : 'normal',
                                            fontStyle: textFormats.name.italic ? 'italic' : 'normal'
                                        }} className="border-b-2 border-gray-300/50 inline-block px-8 md:px-16 pb-2 md:pb-4 mb-4 md:mb-6 leading-tight w-full break-words select-none max-w-full">{studentName}</h2>
                                        
                                        <p style={{ 
                                            fontSize: `${textFormats.reason.size}px`, 
                                            color: textFormats.reason.color,
                                            fontWeight: textFormats.reason.bold ? 'bold' : 'normal',
                                            fontStyle: textFormats.reason.italic ? 'italic' : 'normal'
                                        }} className="leading-snug md:leading-relaxed max-w-3xl select-none opacity-90 break-words max-w-full">{diplomaReason}</p>
                                    </div>

                                    {/* Stopka Dyplomu */}
                                    <div className="z-20 relative flex justify-between items-end px-4 md:px-12 pb-2 flex-shrink-0 w-full select-none">
                                        <div className="text-center w-64 border-t-2 pt-3" style={{ borderColor: `${diplomaTextColor}40` }}>
                                            <div className="font-bold text-lg mb-1" style={{ color: diplomaTextColor }}>{diplomaDate}</div>
                                            <div className="text-[9px] font-black uppercase opacity-50 tracking-wider" style={{ color: diplomaTextColor }}>Miejscowość i data</div>
                                        </div>
                                        
                                        <div className="w-28 h-28 rounded-full border-4 border-red-500/40 flex items-center justify-center rotate-[-15deg] font-black text-[11px] p-2 bg-white/60 shadow-inner text-center z-30" style={{ color: '#ef4444', lineHeight: '1.2' }}>
                                            <span className="drop-shadow-sm">PIECZĘĆ<br/>PLACÓWKI</span>
                                        </div>
                                        
                                        <div className="text-center w-64 border-t-2 pt-3" style={{ borderColor: `${diplomaTextColor}40` }}>
                                            <div className="font-signature font-bold text-lg mb-1 opacity-90" style={{ color: diplomaTextColor }}>{diplomaSignature}</div>
                                            <div className="text-[9px] font-black uppercase opacity-50 tracking-wider" style={{ color: diplomaTextColor }}>Podpis Nauczyciela</div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div id="print-area" className="grid grid-cols-1 gap-12 print:block w-full flex flex-col items-center overflow-visible mt-4">
                                    {garlandText.split('').map((letter, idx) => (
                                        <div key={idx} className="page-break relative aspect-[0.707] w-[80%] mx-auto flex items-center justify-center bg-transparent print:w-[210mm] print:h-[297mm]">
                                            <div className="w-full h-full flex items-center justify-center relative">
                                                {renderGarlandShape(letter)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* MODAL Z INSTRUKCJĄ OBSŁUGI */}
                    {showInstructions && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm print-hidden">
                            <div className="bg-white w-full max-w-3xl max-h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col font-sans">
                                <div className="flex justify-between items-center p-6 border-b border-slate-100 bg-slate-50 flex-shrink-0">
                                    <h2 className="text-xl font-black text-slate-800 flex items-center gap-2"><Icon name="HelpCircle" className="text-indigo-600"/> Instrukcja Obsługi</h2>
                                    <button onClick={() => setShowInstructions(false)} className="p-2 hover:bg-slate-200 rounded-xl transition-colors text-slate-500 hover:text-slate-800 font-bold text-lg">✕</button>
                                </div>
                                
                                <div className="p-6 md:p-8 overflow-y-auto space-y-6 text-sm text-slate-600 custom-scrollbar bg-white">
                                    <p className="text-base font-medium">Witaj w <strong>EduGeneratorze!</strong> To narzędzie stworzone po to, aby błyskawicznie tworzyć przepiękne, spersonalizowane dyplomy i girlandy na każdą szkolną lub przedszkolną okazję.</p>
                                    
                                    <div className="space-y-3">
                                        <h3 className="font-bold text-indigo-900 text-lg border-b pb-1">Krok 1: Podstawa (Wybór stylu)</h3>
                                        <p>Zacznij od lewego panelu bocznego, w sekcji <strong>Podstawa</strong>. Zdecyduj dla kogo tworzysz (np. Żłobek, Przedszkole), wybierz styl grafiki, określ gdzie na stronie mają być obrazki oraz dobierz ulubioną czcionkę.</p>
                                    </div>

                                    <div className="space-y-3">
                                        <h3 className="font-bold text-indigo-900 text-lg border-b pb-1">Krok 2: Wprowadzanie Tekstu</h3>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li>Wybierz zakładkę <strong>Dyplom</strong> lub <strong>Girlanda</strong>.</li>
                                            <li><strong>Dyplom:</strong> Wypełnij tytuł, imię ucznia i powód nagrody. <br/>✨ <em>Pod każdym polem znajdziesz pasek formatowania! Możesz tam pogrubić tekst, zmienić rozmiar i kolor.</em></li>
                                            <li><strong>Girlanda:</strong> Wpisz słowo, które chcesz wydrukować. System wygeneruje jedną literę na każdej stronie A4.</li>
                                        </ul>
                                    </div>

                                    <div className="space-y-3">
                                        <h3 className="font-bold text-indigo-900 text-lg border-b pb-1">Krok 3: Wybór Grafiki</h3>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Błyskawicznie:</strong> Zakładka <em>Motywy</em> – kliknij w gotowy motyw (np. Kosmos, Wiosna), a system sam dobierze odpowiednie kolory i tła.</li>
                                            <li><strong>Grafika AI (Premium):</strong> Zakładka <em>Grafika AI</em> – wpisz co chcesz zobaczyć (np. "uśmiechnięty kot"). Magia AI wygeneruje obrazek i usunie mu tło! <em>(Wymaga kodu dostępu)</em>.</li>
                                        </ul>
                                    </div>

                                    <div className="space-y-3">
                                        <h3 className="font-bold text-indigo-900 text-lg border-b pb-1">Krok 4: Szlify</h3>
                                        <p>W zakładce <strong>Szlify</strong> znajdziesz zaawansowane opcje. Możesz zmienić styl ramek, kolory girlandy oraz dostosować "Szybę Dyplomu" (rozmyte tło pod tekstem), tak aby tekst był idealnie czytelny.</p>
                                    </div>

                                    <div className="space-y-3 bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                                        <h3 className="font-black text-indigo-900 text-lg flex items-center gap-2"><Icon name="Printer" size={20}/> Krok 5: Druk lub zapis do PDF</h3>
                                        <p className="text-indigo-800">Gdy projekt po prawej stronie wygląda świetnie, zjedź na dół lewego panelu i kliknij <strong>WYDRUKUJ PROJEKT</strong>.</p>
                                        <ul className="list-disc pl-5 text-indigo-700 font-medium space-y-1">
                                            <li>Aby wydrukować: Wybierz swoją drukarkę.</li>
                                            <li>Aby zapisać na dysku: W oknie drukowania wybierz opcję <strong>"Zapisz jako PDF"</strong>.</li>
                                        </ul>
                                    </div>
                                    
                                    <div className="text-center pt-2">
                                        <button onClick={() => setShowInstructions(false)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3.5 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all active:scale-95 text-base tracking-wide w-full sm:w-auto">
                                            Zrozumiałem, do dzieła!
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
