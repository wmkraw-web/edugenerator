        const makeWhiteTransparent = (imageSrc) => {
            return new Promise((resolve) => {
                const img = new Image();
                if (!imageSrc.startsWith('blob:') && !imageSrc.startsWith('data:')) {
                    img.crossOrigin = 'Anonymous';
                }
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d', { willReadFrequently: true });
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i];
                            const g = data[i+1];
                            const b = data[i+2];
                            
                            if (r > 225 && g > 225 && b > 225) {
                                data[i+3] = 0; 
                            } 
                            else if (r > 190 && g > 190 && b > 190) {
                                data[i+3] = (255 - Math.max(r, g, b)) * 2.5; 
                            }
                        }
                        ctx.putImageData(imageData, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch(e) {
                        console.warn("Błąd usuwania tła:", e);
                        resolve(imageSrc); 
                    }
                };
                img.onerror = () => resolve(imageSrc);
                img.src = imageSrc;
            });
        };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];

                reader.onload = async (event) => {

            const handleGenerateAiImage = async () => {
                if (!aiPrompt.trim()) return;
                setIsGenerating(true);
                setAiError(null);
                
                let translatedPrompt = aiPrompt;
                
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=pl&tl=en&dt=t&q=${encodeURIComponent(aiPrompt)}`);

                } catch(e) {

                }

                let layoutModifier = graphicLayout === 'full_background' 
                    ? "full frame background scene, edge-to-edge illustration, fully filled canvas" 
                    : "isolated on pure solid white background, no background elements, no text, no words, no letters";
                
                let styleModifier = "";

                  case 'boho': styleModifier = `trendy boho style art, earthy muted pastel colors, minimalist decor, aesthetic shapes`; break;
                  case 'doodle': styleModifier = `hand drawn doodle sketch, colored pencil style, book illustration, cozy`; break;
                  case 'papercraft': styleModifier = `3d papercraft illustration, layered paper cutout style, soft shadows`; break;
                  case 'vibrant': styleModifier = `vibrant bold colors, high contrast, vivid, colorful cartoon illustration, energetic`; break;
                  case 'pastel': styleModifier = `soft pastel aesthetic, dreamy colors, gentle lighting, cute pinterest style`; break;
                  case 'realistic': styleModifier = `highly detailed, highly realistic, photography style, 8k resolution, cinematic lighting`; break;
                  case '3d': styleModifier = `highly detailed 3D Pixar Disney animation style, cute, vibrant colors, masterpiece, soft cinematic lighting, ultra-polished 3D render`; break;

                let fullPrompt = "";
                if (graphicLayout === 'full_background') {

                }
                
                try {
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: fullPrompt })
                    });

                    if (!response.ok) throw new Error("Błąd łączenia z API. Sprawdź klucz FAL_KEY w Vercelu.");

                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <input type="color" value={textFormats.title.color} onChange={e => updateFormat('title', 'color', e.target.value)} className="w-full h-12 rounded-xl cursor-pointer bg-slate-800 p-1 border border-slate-700" />
                                                    <span className="text-[9px] mt-2 font-bold text-slate-400 uppercase text-center">Tytuł</span>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <input type="color" value={textFormats.name.color} onChange={e => updateFormat('name', 'color', e.target.value)} className="w-full h-12 rounded-xl cursor-pointer bg-slate-800 p-1 border border-slate-700" />
                                                    <span className="text-[9px] mt-2 font-bold text-slate-400 uppercase text-center">Imię</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-sky-900/20 p-5 rounded-2xl border border-sky-500/30">
                                            <label className="text-[10px] font-bold text-sky-400 uppercase mb-4 block tracking-widest text-center">Ozdobna Ramka Krawędzi</label>
                                            <div className="grid grid-cols-4 gap-2">
                                                <button onClick={() => setBorderWidth(0)} className={`py-2.5 rounded-xl text-[9px] font-bold uppercase border transition-colors ${borderWidth === 0 ? 'bg-sky-600 text-white border-sky-500' : 'bg-slate-900 text-slate-400 border-slate-700 hover:bg-slate-800'}`}>Brak</button>
                                                <button onClick={() => {setBorderStyle('solid'); setBorderWidth(4);}} className={`py-2.5 rounded-xl text-[9px] font-bold uppercase border transition-colors ${borderWidth === 4 ? 'bg-sky-600 text-white border-sky-500' : 'bg-slate-900 text-slate-400 border-slate-700 hover:bg-slate-800'}`}>Cienka</button>
                                                <button onClick={() => {setBorderStyle('solid'); setBorderWidth(16);}} className={`py-2.5 rounded-xl text-[9px] font-bold uppercase border transition-colors ${borderWidth === 16 && borderStyle === 'solid' ? 'bg-sky-600 text-white border-sky-500' : 'bg-slate-900 text-slate-400 border-slate-700 hover:bg-slate-800'}`}>Gruba</button>
                                                <button onClick={() => {setBorderStyle('dashed'); setBorderWidth(16);}} className={`py-2.5 rounded-xl text-[9px] font-bold uppercase border transition-colors ${borderStyle === 'dashed' ? 'bg-sky-600 text-white border-sky-500' : 'bg-slate-900 text-slate-400 border-slate-700 hover:bg-slate-800'}`}>Kreski</button>
                                            </div>
                                        </div>

                                        <div className={`space-y-5 pt-4 ${previewMode === 'garland' ? 'opacity-30 pointer-events-none' : ''}`}>
                                            <div>
                                                <div className="flex justify-between text-[10px] font-bold text-slate-300 mb-2 uppercase tracking-wider"><span>Wyrazistość Grafiki AI (Tła)</span><span className="text-sky-400">{bgImageOpacity}%</span></div>
                                                <input type="range" min="5" max="100" value={bgImageOpacity} onChange={e => setBgImageOpacity(Number(e.target.value))} className="w-full accent-sky-500 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-[10px] font-bold text-slate-300 mb-2 uppercase tracking-wider"><span>Przezroczystość (Górna Szyba)</span><span className="text-sky-400">{titleBoxOpacity}%</span></div>
                                                <input type="range" min="0" max="100" value={titleBoxOpacity} onChange={e => setTitleBoxOpacity(Number(e.target.value))} className="w-full accent-sky-500 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-[10px] font-bold text-slate-300 mb-2 uppercase tracking-wider"><span>Przezroczystość (Główna Szyba)</span><span className="text-sky-400">{boxOpacity}%</span></div>
                                                <input type="range" min="0" max="100" value={boxOpacity} onChange={e => setBoxOpacity(Number(e.target.value))} className="w-full accent-sky-500 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* EduBot Pomocnik */}
                            <div className="p-5 rounded-3xl shadow-lg border flex items-start gap-4 animate-[reveal_0.3s_ease-out] transition-colors bg-indigo-900/20 border-indigo-500/30">
                                <BotHelperAvatar />
                                <div className="flex-1 pt-1">
                                    <h4 className="font-black text-xs uppercase tracking-widest mb-1.5 text-indigo-400">EduBot Kreator</h4>
                                    <p className="text-sm font-medium leading-relaxed text-slate-300 bot-bubble" key={botMessage}>{botMessage}</p>
                                </div>
                            </div>
                        </div>

                        {/* PANEL PRAWY - PODGLĄD (KARTKA PAPIERU ZAWSZE BIAŁA/KOLOROWA, TŁO APLIKACJI CIEMNE) */}
                        <div className="lg:col-span-8 flex justify-center items-start lg:sticky lg:top-28 self-start print:static w-full relative">
                            
                            {/* Ciemne tło w kropki dla panelu roboczego (kontrastujące z kartką) */}
                            <div className="absolute inset-0 dark-grid-bg -z-10 rounded-[3rem] opacity-30 print-hidden"></div>

                            {previewMode === 'diploma' ? (
                                <div 
                                    id="print-area"
                                    className={`relative flex flex-col justify-between ${diplomaOrientation === 'horizontal' ? 'w-full aspect-[1.414]' : 'w-[85%] mx-auto aspect-[0.707]'} rounded-[1rem] md:rounded-[2rem] p-10 md:p-14 text-center shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-all duration-500 overflow-hidden bg-cover bg-center bg-no-repeat`}
                                    style={{ 
                                        backgroundColor: diplomaBgColor,
                                        borderWidth: `${borderWidth}px`,
                                        borderStyle: borderStyle,
                                        borderColor: diplomaBorderColor,
                                        color: diplomaTextColor
                                    }}
                                >
                                    {/* Grafiki Tła (z Motywów) */}
                                    {!customImage && (
                                        <div className="absolute inset-0 z-0 pointer-events-none opacity-[0.15] flex items-center justify-center space-x-32 scale-150">
                                            <div className="text-[15rem] drop-shadow-md">{activeTheme.elements[0]}</div>
                                            <div className="text-[15rem] drop-shadow-md">{activeTheme.elements[1]}</div>
                                        </div>
                                    )}

                                    {/* Ilustracja AI lub Własna Wgrana */}
                                    {customImage && (
                                        <div className="absolute inset-0 z-10 pointer-events-none">
                                            {graphicLayout === 'full_background' ? (
                                                <img src={customImage} className="w-full h-full object-cover" style={{ opacity: bgImageOpacity / 100 }} />
                                            ) : graphicLayout === 'bottom_corners' ? (
                                                <>
                                                    <img src={customImage} className="absolute bottom-[-1rem] left-[-2rem] w-64 h-64 md:w-72 md:h-72 object-contain rotate-6 drop-shadow-2xl" style={{ opacity: bgImageOpacity / 100 }} />
                                                    <img src={customImage} className="absolute bottom-[-1rem] right-[-2rem] w-64 h-64 md:w-72 md:h-72 object-contain -rotate-12 drop-shadow-2xl" style={{ opacity: bgImageOpacity / 100 }} />
                                                </>
                                            ) : graphicLayout === 'bottom_center' ? (
                                                <img src={customImage} className="absolute bottom-[-2rem] left-1/2 -translate-x-1/2 w-72 h-72 md:w-[28rem] md:h-[28rem] object-contain drop-shadow-2xl" style={{ opacity: bgImageOpacity / 100 }} />
                                            ) : null}
                                        </div>
                                    )}

                                    {/* Znak wodny wersji darmowej */}
                                    {!isPremium && <div className="absolute inset-0 z-50 flex items-center justify-center opacity-[0.05] rotate-[-35deg] text-4xl md:text-6xl font-black uppercase pointer-events-none select-none tracking-[1rem] text-slate-800">EDUGENERATOR.PL</div>}

                                    {/* Nagłówek Dyplomu z Szybą Tytułu */}
                                    <div 
                                        className="z-20 relative mx-auto flex flex-col items-center justify-center transition-all duration-300 py-4 px-6 md:py-6 md:px-10 rounded-[2rem] flex-shrink-0"
                                        style={{ 
                                            width: `${titleBoxWidth}%`,
                                            transform: `translateY(${titleBoxOffset}px)`, 
                                            backgroundColor: `rgba(255,255,255,${titleBoxOpacity/100})`, 
                                            backdropFilter: titleBoxOpacity > 0 ? `blur(${(titleBoxOpacity/100)*16}px)` : 'none',
                                            WebkitBackdropFilter: titleBoxOpacity > 0 ? `blur(${(titleBoxOpacity/100)*16}px)` : 'none',
                                            border: titleBoxOpacity > 0 ? '1px solid rgba(255,255,255,0.4)' : 'none',
                                            boxShadow: titleBoxOpacity > 0 ? '0 10px 30px -10px rgba(0, 0, 0, 0.1)' : 'none'
                                        }}
                                    >
                                        <div className="space-y-2 w-full">
                                            <h1 style={{ 
                                                fontSize: `${textFormats.title.size}px`, 
                                                color: textFormats.title.color,
                                                fontWeight: textFormats.title.bold ? 'bold' : 'normal',
                                                fontStyle: textFormats.title.italic ? 'italic' : 'normal',
                                                textShadow: '0px 0px 15px rgba(255,255,255,0.9), 0px 0px 5px rgba(255,255,255,0.8)'
                                            }} className="tracking-[0.2em] uppercase leading-none drop-shadow-sm select-none break-normal max-w-full block">{diplomaTitle}</h1>
                                            
                                            <h3 style={{ 
                                                fontSize: `${textFormats.subtitle.size}px`, 
                                                color: textFormats.subtitle.color,
                                                fontWeight: textFormats.subtitle.bold ? 'bold' : 'normal',
                                                fontStyle: textFormats.subtitle.italic ? 'italic' : 'normal',
                                                textShadow: '0px 0px 10px rgba(255,255,255,0.9)'
                                            }} className="opacity-80 uppercase tracking-widest min-h-[1.5em] select-none break-normal max-w-full block">{diplomaSubtitle}</h3>
                                        </div>
                                    </div>

                                    {/* Szyba Główna (Glassmorphism na dokumencie) */}
                                    <div 
                                        className="z-20 relative mx-auto flex flex-col items-center justify-center transition-all duration-300 py-6 px-8 md:py-10 md:px-14 rounded-[2rem] border border-white/40 shadow-xl my-auto flex-grow-0"
                                        style={{ 
                                            width: `${boxWidth}%`,
                                            transform: `translateY(${boxOffset}px)`, 
                                            backgroundColor: `rgba(255,255,255,${boxOpacity/100})`, 
                                            backdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*16}px)` : 'none',
                                            WebkitBackdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*16}px)` : 'none',
                                            boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.15)'
                                        }}
                                    >
                                        <h2 style={{ 
                                            fontSize: `${textFormats.name.size}px`, 
                                            color: textFormats.name.color,
                                            fontWeight: textFormats.name.bold ? 'bold' : 'normal',
                                            fontStyle: textFormats.name.italic ? 'italic' : 'normal',
                                            textShadow: '0px 0px 15px rgba(255,255,255,0.9), 0px 0px 5px rgba(255,255,255,0.8)'
                                        }} className="border-b-2 border-slate-300/50 inline-block px-8 md:px-16 pb-2 md:pb-4 mb-4 md:mb-6 leading-tight w-full break-normal select-none max-w-full">{studentName}</h2>
                                        
                                        <p style={{ 
                                            fontSize: `${textFormats.reason.size}px`, 
                                            color: textFormats.reason.color,
                                            fontWeight: textFormats.reason.bold ? 'bold' : 'normal',
                                            fontStyle: textFormats.reason.italic ? 'italic' : 'normal',
                                            textShadow: '0px 0px 10px rgba(255,255,255,0.9)'
                                        }} className="leading-snug md:leading-relaxed max-w-3xl select-none opacity-90 break-normal max-w-full">{diplomaReason}</p>
                                    </div>

                                    {/* Stopka Dyplomu */}
                                    <div className="z-20 relative flex justify-between items-end px-4 md:px-12 pb-2 flex-shrink-0 w-full select-none">
                                        <div className="text-center w-40 md:w-64 border-t-2 pt-3" style={{ borderColor: `${diplomaTextColor}40` }}>
                                            <div className="font-bold text-sm md:text-lg mb-1" style={{ color: diplomaTextColor }}>{diplomaDate}</div>
                                            <div className="text-[7px] md:text-[9px] font-black uppercase opacity-60 tracking-wider" style={{ color: diplomaTextColor }}>Miejscowość i data</div>
                                        </div>
                                        
                                        <div className="text-center w-40 md:w-64 border-t-2 pt-3" style={{ borderColor: `${diplomaTextColor}40` }}>
                                            <div className="font-signature font-bold text-sm md:text-lg mb-1 opacity-90" style={{ color: diplomaTextColor }}>{diplomaSignature}</div>
                                            <div className="text-[7px] md:text-[9px] font-black uppercase opacity-60 tracking-wider" style={{ color: diplomaTextColor }}>Podpis Nauczyciela</div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div id="print-area" className="grid grid-cols-1 gap-12 print:block w-full flex flex-col items-center overflow-visible mt-4">
                                    {garlandText.split('').map((letter, idx) => (
                                        <div key={idx} className="page-break relative aspect-[0.707] w-[80%] mx-auto flex items-center justify-center bg-transparent print:w-[210mm] print:h-[297mm]">
                                            <div className="w-full h-full flex items-center justify-center relative">
                                                {renderGarlandShape(letter)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <button onClick={() => window.print()} className="w-full absolute -bottom-20 left-0 bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black text-base tracking-widest flex items-center justify-center space-x-3 shadow-[0_0_30px_rgba(99,102,241,0.4)] transition-all active:scale-95 uppercase print-hidden">
                                <Icon name="Printer" size={24} /><span>DRUKUJ PROJEKT (PDF)</span>
                            </button>
                        </div>
                    </div>

                    {/* MODAL Z INSTRUKCJĄ OBSŁUGI */}
                    {showInstructions && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md print-hidden">
                            <div className="glass-panel w-full max-w-3xl max-h-[90vh] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col font-sans border border-slate-700">
                                <div className="flex justify-between items-center p-6 border-b border-slate-700 bg-slate-900/80 flex-shrink-0">
                                    <h2 className="text-xl font-black text-white flex items-center gap-3"><Icon name="HelpCircle" className="text-indigo-500"/> Instrukcja Obsługi</h2>
                                    <button onClick={() => setShowInstructions(false)} className="p-2 hover:bg-slate-800 rounded-xl transition-colors text-slate-400 hover:text-white font-bold text-lg">✕</button>
                                </div>
                                
                                <div className="p-6 md:p-8 overflow-y-auto space-y-8 text-sm text-slate-300 custom-scrollbar bg-slate-900/50">
                                    <p className="text-base font-medium text-white">Witaj w <strong>EduGeneratorze PRO!</strong> To narzędzie stworzone po to, aby błyskawicznie tworzyć przepiękne, spersonalizowane dyplomy i girlandy.</p>
                                    
                                    <div className="space-y-3 bg-slate-800/50 p-5 rounded-2xl border border-slate-700">
                                        <h3 className="font-bold text-indigo-400 text-lg border-b border-slate-700 pb-2">Krok 1: Wybór Narzędzia</h3>
                                        <p>Z lewego panelu wybierz jedną z 5 zakładek. Przełączaj się między Dyplomem a Girlandą, aby zmienić główny widok. W zakładce "Podstawa" ustawiasz styl i orientację.</p>
                                    </div>

                                    <div className="space-y-3 bg-slate-800/50 p-5 rounded-2xl border border-slate-700">
                                        <h3 className="font-bold text-indigo-400 text-lg border-b border-slate-700 pb-2">Krok 2: Wprowadzanie Tekstu</h3>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Dyplom:</strong> Wypełnij tytuł, imię ucznia i powód nagrody. <br/><span className="text-indigo-300">✨ Paski formatowania pozwalają powiększać i pogrubiać tekst!</span></li>
                                            <li><strong>Girlanda:</strong> Wpisz słowo, które chcesz wydrukować. System wygeneruje jedną literę na każdej stronie A4.</li>
                                        </ul>
                                    </div>

                                    <div className="space-y-3 bg-slate-800/50 p-5 rounded-2xl border border-slate-700">
                                        <h3 className="font-bold text-purple-400 text-lg border-b border-slate-700 pb-2">Krok 3: Grafika i AI (Magiczna Gumka)</h3>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Motywy:</strong> Wgraj własne zdjęcie lub wybierz gotowy wzór. Magiczna gumka sama usunie tło ze zdjęcia!</li>
                                            <li><strong>Grafika AI:</strong> Opisz słowami co chcesz zobaczyć (wymaga kodu Premium). Super szybki model Flux wygeneruje obrazek prosto na Twój dyplom.</li>
                                        </ul>
                                    </div>

                                    <div className="space-y-3 bg-indigo-900/20 p-6 rounded-2xl border border-indigo-500/30">
                                        <h3 className="font-black text-indigo-400 text-lg flex items-center gap-2"><Icon name="Printer" size={20}/> Krok 4: Wydruk (PDF)</h3>
                                        <p className="text-indigo-200 font-medium">Gdy projekt po prawej stronie wygląda świetnie, kliknij wielki przycisk <strong>DRUKUJ PROJEKT</strong> na samym dole.</p>
                                        <ul className="list-disc pl-5 text-indigo-300 space-y-1">
                                            <li>Wybierz swoją drukarkę.</li>
                                            <li>Jeśli chcesz zapisać projekt i wydrukować później, w okienku drukowania wybierz opcję <strong>"Zapisz jako PDF"</strong>.</li>
                                        </ul>
                                    </div>
                                    
                                    <div className="text-center pt-4">
                                        <button onClick={() => setShowInstructions(false)} className="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-xl font-black shadow-[0_0_20px_rgba(99,102,241,0.3)] transition-all active:scale-95 text-base tracking-wide w-full sm:w-auto uppercase">
                                            Rozumiem, do dzieła!
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
