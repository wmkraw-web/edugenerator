<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenerator - Dyplomy i Girlandy</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Balsamiq+Sans:wght@400;700&family=Caveat:wght@400..700&family=Cinzel:wght@400..900&family=Dancing+Script:wght@400..700&family=Lobster&family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Patrick+Hand&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quicksand:wght@400;700&family=Roboto:wght@400;700&family=Satisfy&display=swap');
        
        body { background-color: #f8fafc; }
        .font-sans { font-family: 'Montserrat', sans-serif; }
        .font-balsamiq { font-family: 'Balsamiq Sans', cursive; }
        .font-pacifico { font-family: 'Pacifico', cursive; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-caveat { font-family: 'Caveat', cursive; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-dancing { font-family: 'Dancing Script', cursive; }
        .font-patrick { font-family: 'Patrick Hand', cursive; }
        .font-amatic { font-family: 'Amatic SC', cursive; }
        .font-lobster { font-family: 'Lobster', cursive; }
        .font-lora { font-family: 'Lora', serif; }
        .font-oswald { font-family: 'Oswald', sans-serif; }
        .font-quicksand { font-family: 'Quicksand', sans-serif; }
        .font-roboto { font-family: 'Roboto', sans-serif; }
        .font-satisfy { font-family: 'Satisfy', cursive; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Ukrywanie elementów podczas druku i ustawianie tła */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; border: none !important; margin: 0 !important; }
            .print-hidden { display: none !important; }
            .page-break { page-break-after: always; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; visibility: visible !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Award: (<><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526M20 7a8 8 0 1 1-16 0 8 8 0 0 1 16 0z"/><circle cx="12" cy="7" r="3"/></>),
                Type: (<><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>),
                Palette: (<><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.688-1.688h1.906c3.11 0 5.625-2.515 5.625-5.625 0-4.75-4.477-8.75-10-8.75z"/></>),
                Wand2: <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.21 1.21 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72ZM14 7l3 3M5 6v1M19 2v1M10 2v2M7 10H6M22 9h-2M15 2h1"/>,
                Sliders: (<><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="2" y1="14" x2="6" y2="14"/><line x1="10" y1="12" x2="14" y2="12"/><line x1="18" y1="16" x2="22" y2="16"/></>),
                Key: <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5L15.5 7.5z"/>,
                Settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const THEMES = [
          { id: 'watercolor', name: 'Akwarelowy Sen', bg: 'bg-white', borderHex: '#818cf8', elements: ['☁️', '✨'] },
          { id: 'boho', name: 'Styl Boho', bg: 'bg-[#FAF9F6]', borderHex: '#D4B895', elements: ['🌿', '☀️'] },
          { id: 'rodzina', name: 'Dzień Rodziny', bg: 'bg-rose-50', borderHex: '#f43f5e', elements: ['❤️', '🏡'] },
          { id: 'autyzm', name: 'Dzień Autyzmu', bg: 'bg-blue-50', borderHex: '#3b82f6', elements: ['💙', '🧩'] },
          { id: 'skarpetka', name: 'Dzień Skarpetki', bg: 'bg-fuchsia-50', borderHex: '#fb923c', elements: ['🧦', '🌈'] },
          { id: 'pasowanie', name: 'Pasowanie', bg: 'bg-indigo-50', borderHex: '#6366f1', elements: ['🎒', '🖍️'] },
          { id: 'zakonczenie', name: 'Zakończenie Roku', bg: 'bg-yellow-50', borderHex: '#eab308', elements: ['🎓', '🌻'] },
          { id: 'przedszkolak', name: 'Dzień Przedszkolaka', bg: 'bg-yellow-100', borderHex: '#f87171', elements: ['🎈', '🧸'] },
          { id: 'dziecko', name: 'Dzień Dziecka', bg: 'bg-green-50', borderHex: '#4ade80', elements: ['🍭', '🎠'] },
          { id: 'nauczyciel', name: 'Dzień Nauczyciela', bg: 'bg-indigo-50', borderHex: '#6366f1', elements: ['🦉', '✏️'] },
          { id: 'space', name: 'Kosmos', bg: 'bg-indigo-900', borderHex: '#818cf8', elements: ['🚀', '⭐'] },
          { id: 'wiosna', name: 'Pani Wiosna', bg: 'bg-pink-50', borderHex: '#f472b6', elements: ['🌸', '🦋'] },
          { id: 'zima', name: 'Pani Zima', bg: 'bg-sky-50', borderHex: '#7dd3fc', elements: ['❄️', '⛄'] },
          { id: 'jesien', name: 'Pani Jesień', bg: 'bg-orange-50', borderHex: '#ea580c', elements: ['🍁', '🍄'] },
          { id: 'lato', name: 'Powitanie Lata', bg: 'bg-yellow-50', borderHex: '#facc15', elements: ['☀️', '🏖️'] }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('diploma');
            const [previewMode, setPreviewMode] = useState('diploma');
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            
            // Dane Dyplomu
            const [diplomaTitle, setDiplomaTitle] = useState('DYPLOM');
            const [diplomaSubtitle, setDiplomaSubtitle] = useState('ZA WYBITNE OSIĄGNIĘCIA');
            const [studentName, setStudentName] = useState('Jan Kowalski');
            const [diplomaReason, setDiplomaReason] = useState('za udział w konkursie plastycznym "Wiosna w przedszkolu" i przygotowanie najpiękniejszej pracy.');
            const [diplomaDate, setDiplomaDate] = useState('Leżajsk, 29 Marca 2026');
            const [diplomaSignature, setDiplomaSignature] = useState('Wychowawca');
            
            // Rozmiary i Slidery
            const [titleSize, setTitleSize] = useState(64);
            const [nameSize, setNameSize] = useState(60);
            const [reasonSize, setReasonSize] = useState(22);
            const [boxWidth, setBoxWidth] = useState(85); 
            const [boxOpacity, setBoxOpacity] = useState(90); 
            const [boxOffset, setBoxOffset] = useState(0); // Przesunięcie pionowe szyby

            // Girlanda
            const [garlandLetterSize, setGarlandLetterSize] = useState(180); 
            const [garlandLetterOffset, setGarlandLetterOffset] = useState(50); 
            const [garlandText, setGarlandText] = useState('WITAJCIE');
            const [garlandShape, setGarlandShape] = useState('triangle'); 

            // Wygląd i Kolory
            const [diplomaTextColor, setDiplomaTextColor] = useState('#1e293b');
            const [garlandTextColor, setGarlandTextColor] = useState('#6366f1');
            const [borderStyle, setBorderStyle] = useState('solid'); 
            const [borderWidth, setBorderWidth] = useState(12);
            const [selectedThemeId, setSelectedThemeId] = useState('pasowanie');
            const [selectedFont, setSelectedFont] = useState('font-sans');
            const [artStyle, setArtStyle] = useState('watercolor'); 
            const [graphicLayout, setGraphicLayout] = useState('bottom_corners'); 
            const [diplomaOrientation, setDiplomaOrientation] = useState('horizontal');
            const [ageGroup, setAgeGroup] = useState('przedszkole');

            // AI i Obrazy
            const [aiPrompt, setAiPrompt] = useState('');
            const [customImage, setCustomImage] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [errorMessage, setErrorMessage] = useState('');

            const activeTheme = THEMES.find(t => t.id === selectedThemeId) || THEMES[0];

            useEffect(() => {
                setGarlandTextColor(activeTheme.borderHex);
            }, [selectedThemeId]);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { setIsPremium(true); setAccessCode(''); }
                else alert('Błędny kod!');
            };

            const handleGenerateAiImage = async () => {
                if (!aiPrompt.trim()) return;
                
                setIsGenerating(true);
                setErrorMessage('');
                
                const styleMap = {
                    boho: "earthy boho style, natural tones, soft lines, highly detailed",
                    pastel_pinterest: "soft pastel aesthetic, pinterest style, dreamy colors",
                    vibrant_sharp: "vibrant bold sharp colors, professional vector style",
                    watercolor: "soft artistic watercolor style, traditional textures, masterpiece"
                };
                const agePrompts = {
                    zlobek: "very simple bold shapes for babies, minimal detail, extremely cute",
                    przedszkole: "playful cute kindergarten style, cheerful colors, friendly",
                    szkola: "educational illustration for primary school, clean professional look"
                };
                
                const finalPrompt = `${aiPrompt} - ${styleMap[artStyle]} - ${agePrompts[ageGroup]} - single object isolated on pure white background, no cutoffs, fully visible`;
                
                try {
                    // DARMOWE API POLLINATIONS (Nie wymaga kluczy, logowania ani płatności!)
                    const seed = Math.floor(Math.random() * 1000000);
                    const encodedPrompt = encodeURIComponent(finalPrompt);
                    const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&nologo=true&seed=${seed}`;
                    
                    // Weryfikacja czy obrazek został poprawnie wygenerowany i pobrany
                    const img = new Image();
                    img.onload = () => {
                        setCustomImage(imageUrl);
                        setIsGenerating(false);
                    };
                    img.onerror = () => {
                        throw new Error("Wystąpił problem z pobraniem obrazka. Spróbuj zmodyfikować opis.");
                    };
                    img.src = imageUrl;

                } catch (e) { 
                    console.error(e);
                    setErrorMessage(`Problem z generowaniem AI: ${e.message}`);
                    setIsGenerating(false);
                }
            };

            const renderGarlandShape = (letter) => {
                let fillVal = '#ffffff';
                if (activeTheme.id === 'boho') fillVal = '#FAF9F6';
                if (activeTheme.id === 'rodzina') fillVal = '#fff1f2';
                if (activeTheme.bg.includes('blue-50')) fillVal = '#eff6ff';
                if (activeTheme.bg.includes('indigo-900')) fillVal = '#312e81';

                return (
                    <div className="relative w-full h-full flex items-center justify-center p-4 overflow-hidden drop-shadow-lg">
                        <svg viewBox="0 0 100 120" className="w-full h-full" preserveAspectRatio="none">
                            <path d="M5,5 L95,5 L50,115 Z" fill={fillVal} stroke={activeTheme.borderHex} strokeWidth={borderWidth/2} strokeDasharray={borderStyle === 'dashed' ? '5,5' : 'none'} strokeLinejoin="round" />
                            <circle cx="15" cy="15" r="3" fill="#ffffff" stroke="#e2e8f0" strokeWidth="0.5"/>
                            <circle cx="85" cy="15" r="3" fill="#ffffff" stroke="#e2e8f0" strokeWidth="0.5"/>
                        </svg>
                        
                        <div className="absolute inset-0 flex flex-col items-center justify-center pt-8">
                            {customImage && <img src={customImage} className="absolute inset-x-0 top-[40%] -translate-y-1/2 m-auto w-48 h-48 object-contain opacity-20 pointer-events-none" />}
                            
                            <div className="absolute border-2 border-dashed rounded-full flex items-center justify-center"
                                 style={{ 
                                     borderColor: activeTheme.borderHex, 
                                     width: `${garlandLetterSize * 1.5}px`, 
                                     height: `${garlandLetterSize * 1.5}px`,
                                     transform: `translateY(${garlandLetterOffset}px)`,
                                     opacity: 0.3
                                 }}>
                            </div>

                            <span 
                                className="font-black leading-none select-none z-10" 
                                style={{
                                    color: garlandTextColor, 
                                    fontSize: `${garlandLetterSize}px`,
                                    transform: `translateY(${garlandLetterOffset}px)`
                                }}
                            >
                                {letter}
                            </span>
                        </div>
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col ${selectedFont}`}>
                    {/* Nawigacja Górna */}
                    <nav className="bg-white border-b px-8 py-4 flex justify-between items-center print-hidden sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3 font-black text-2xl tracking-tight">
                            <div className="bg-indigo-600 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-200"><Icon name="Award" size={24}/></div>
                            <span className="text-gray-800">Edu<span className="text-indigo-600">Generator</span></span>
                        </div>
                        <div className="flex items-center space-x-4">
                            {!isPremium && (
                                <div className="flex items-center space-x-2 bg-gray-50 p-1.5 rounded-xl border border-gray-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod dostępu..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium text-gray-700"/>
                                    <button onClick={handleVerifyCode} className="p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow-sm transition-colors"><Icon name="Key" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-yellow-900 px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all active:scale-95">
                                <Icon name="Coffee" size={20} /><span>{isPremium ? "Dzięki za Kawę!" : "Postaw Kawę"}</span>
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full">
                        {/* PANEL BOCZNY (Narzędzia) */}
                        <div className="lg:col-span-4 space-y-5 print-hidden flex flex-col">
                            
                            <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-5">
                                <div className="flex items-center justify-between border-b pb-3">
                                    <h2 className="font-bold flex items-center text-indigo-900 text-sm uppercase tracking-widest"><Icon name="Settings" size={18} className="mr-2 text-indigo-500"/> Podstawa</h2>
                                    <select value={diplomaOrientation} onChange={e => setDiplomaOrientation(e.target.value)} className="p-1.5 border border-gray-200 rounded-lg text-xs font-bold outline-none bg-gray-50 text-gray-700 cursor-pointer">
                                        <option value="horizontal">↔️ Poziom</option>
                                        <option value="vertical">↕️ Pion</option>
                                    </select>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 block mb-1.5 uppercase tracking-wider">Czcionka</label>
                                        <select value={selectedFont} onChange={e => setSelectedFont(e.target.value)} className="w-full p-2.5 border border-gray-200 rounded-xl text-sm outline-none bg-gray-50 cursor-pointer font-medium">
                                            <option value="font-sans">Montserrat</option>
                                            <option value="font-balsamiq">Balsamiq</option>
                                            <option value="font-caveat">Caveat (Odręczna)</option>
                                            <option value="font-pacifico">Pacifico</option>
                                            <option value="font-dancing">Dancing Script</option>
                                            <option value="font-lobster">Lobster</option>
                                            <option value="font-playfair">Playfair (Elegancka)</option>
                                            <option value="font-amatic">Amatic SC</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 block mb-1.5 uppercase tracking-wider">Układ Grafiki</label>
                                        <select value={graphicLayout} onChange={e => setGraphicLayout(e.target.value)} className="w-full p-2.5 border border-indigo-100 rounded-xl text-sm outline-none bg-indigo-50/50 text-indigo-800 cursor-pointer font-medium">
                                            <option value="bottom_corners">✨ Dolne rogi</option>
                                            <option value="bottom_center">🌟 Środek Dół</option>
                                            <option value="full_background">🖼️ Na całe Tło</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="bg-gradient-to-r from-indigo-50 to-blue-50 p-3.5 rounded-2xl border border-indigo-100/50">
                                    <label className="text-[10px] font-bold text-indigo-800 block mb-2.5 uppercase tracking-widest text-center">Dla kogo rysujemy?</label>
                                    <div className="flex bg-white rounded-xl p-1 shadow-sm border border-indigo-50">
                                        {['zlobek', 'przedszkole', 'szkola'].map(age => (
                                            <button 
                                                key={age}
                                                onClick={() => setAgeGroup(age)} 
                                                className={`flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all duration-200 ${ageGroup === age ? 'bg-indigo-600 text-white shadow-md scale-[1.02]' : 'bg-transparent text-gray-500 hover:bg-gray-50'}`}
                                            >
                                                {age === 'zlobek' ? '👶 Żłobek' : age === 'przedszkole' ? '🎈 Przedszkole' : '🏫 Szkoła'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-1.5 rounded-2xl shadow-sm border border-gray-100 flex gap-1">
                                <button onClick={() => {setActiveTab('diploma'); setPreviewMode('diploma');}} className={`flex-1 py-3.5 rounded-xl flex flex-col items-center justify-center text-[10px] font-bold uppercase tracking-wide transition-all ${activeTab === 'diploma' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100/50' : 'text-gray-400 hover:bg-gray-50'}`}><Icon name="Award" size={20} className="mb-1.5"/>Dyplom</button>
                                <button onClick={() => {setActiveTab('garland'); setPreviewMode('garland');}} className={`flex-1 py-3.5 rounded-xl flex flex-col items-center justify-center text-[10px] font-bold uppercase tracking-wide transition-all ${activeTab === 'garland' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100/50' : 'text-gray-400 hover:bg-gray-50'}`}><Icon name="Type" size={20} className="mb-1.5"/>Girlanda</button>
                                <button onClick={() => setActiveTab('themes')} className={`flex-1 py-3.5 rounded-xl flex flex-col items-center justify-center text-[10px] font-bold uppercase tracking-wide transition-all ${activeTab === 'themes' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100/50' : 'text-gray-400 hover:bg-gray-50'}`}><Icon name="Palette" size={20} className="mb-1.5"/>Motywy</button>
                                <button onClick={() => setActiveTab('sliders')} className={`flex-1 py-3.5 rounded-xl flex flex-col items-center justify-center text-[10px] font-bold uppercase tracking-wide transition-all ${activeTab === 'sliders' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100/50' : 'text-gray-400 hover:bg-gray-50'}`}><Icon name="Sliders" size={20} className="mb-1.5"/>Szlify</button>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex-1">
                                {activeTab === 'diploma' && (
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 uppercase ml-1">Tytuł Dyplomu</label>
                                            <input type="text" value={diplomaTitle} onChange={e => setDiplomaTitle(e.target.value)} className="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-indigo-400 focus:bg-white transition-colors" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-indigo-500 uppercase ml-1">Imię i Nazwisko</label>
                                            <input type="text" value={studentName} onChange={e => setStudentName(e.target.value)} className="w-full mt-1 p-3.5 bg-indigo-50/30 border-2 border-indigo-100 rounded-xl font-bold text-lg outline-none focus:border-indigo-500 transition-colors" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 uppercase ml-1">Za co?</label>
                                            <textarea value={diplomaReason} onChange={e => setDiplomaReason(e.target.value)} rows="3" className="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm resize-none focus:border-indigo-400 focus:bg-white transition-colors" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 pt-2">
                                            <div>
                                                <label className="text-[9px] font-bold text-gray-400 uppercase ml-1">Miejscowość i Data</label>
                                                <input type="text" value={diplomaDate} onChange={e => setDiplomaDate(e.target.value)} className="w-full mt-1 p-2.5 border border-gray-200 rounded-lg text-xs outline-none bg-gray-50" />
                                            </div>
                                            <div>
                                                <label className="text-[9px] font-bold text-gray-400 uppercase ml-1">Podpis Nauczyciela</label>
                                                <input type="text" value={diplomaSignature} onChange={e => setDiplomaSignature(e.target.value)} className="w-full mt-1 p-2.5 border border-gray-200 rounded-lg text-xs outline-none bg-gray-50" />
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'garland' && (
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-[10px] font-bold text-indigo-500 uppercase ml-1">Tekst na proporczykach</label>
                                            <input type="text" value={garlandText} onChange={e => setGarlandText(e.target.value.toUpperCase())} className="w-full mt-1 p-4 bg-indigo-50/30 border-2 border-indigo-100 rounded-xl font-black text-2xl text-center outline-none tracking-[0.5rem] focus:border-indigo-500 transition-colors" />
                                            <p className="text-[10px] text-gray-400 text-center mt-2 italic">Aplikacja wygeneruje osobną stronę dla każdej litery do druku.</p>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'themes' && (
                                    <div className="space-y-5">
                                        <div className="bg-gradient-to-br from-indigo-50 to-white p-5 rounded-2xl border border-indigo-100 shadow-sm relative overflow-hidden">
                                            <div className="absolute top-0 right-0 p-3 opacity-10"><Icon name="Wand2" size={40}/></div>
                                            <label className="text-[11px] font-black text-indigo-800 block mb-3 uppercase tracking-widest relative z-10">Kreator Obrazków AI (Darmowy)</label>
                                            
                                            {/* Zmiana: Informacja o usunięciu konieczności wpisywania klucza */}
                                            <div className="mb-4 bg-green-50 p-3 rounded-xl border border-green-200 shadow-sm relative z-10">
                                                <p className="text-[10px] font-bold text-green-700 uppercase flex items-center"><Icon name="Award" size={14} className="mr-1"/> Połączono z darmowym AI. Nie wymaga klucza API!</p>
                                            </div>

                                            <div className="flex space-x-2 relative z-10">
                                                <input type="text" value={aiPrompt} onChange={e => setAiPrompt(e.target.value)} placeholder="Opisz obrazek (np. wesoły miś z balonem)" className="flex-1 p-3 border border-indigo-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-100 bg-white" />
                                                <button onClick={handleGenerateAiImage} disabled={isGenerating} className="bg-indigo-600 text-white px-5 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 disabled:bg-gray-400 transition-colors flex items-center">
                                                    {isGenerating ? 'Czary...' : 'Rysuj'}
                                                </button>
                                            </div>
                                            {errorMessage && <div className="mt-3 p-3 bg-red-50 text-red-700 text-[11px] rounded-lg border border-red-200 font-bold relative z-10">{errorMessage}</div>}
                                        </div>

                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1 mb-2 block">Gotowe Motywy Kolorystyczne</label>
                                            <div className="grid grid-cols-3 gap-2 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
                                                {THEMES.map(t => (
                                                    <button key={t.id} onClick={() => {setSelectedThemeId(t.id); setCustomImage(null);}} className={`p-3 rounded-xl border-2 flex flex-col items-center transition-all duration-200 ${selectedThemeId === t.id ? 'border-indigo-500 bg-indigo-50 shadow-sm scale-[1.02]' : 'border-gray-100 hover:border-indigo-200 hover:bg-gray-50'}`}>
                                                        <span className="text-2xl mb-1">{t.elements[0]}</span>
                                                        <span className="text-[9px] truncate w-full text-center font-bold text-gray-700 leading-tight">{t.name}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'sliders' && (
                                    <div className="space-y-5 max-h-[450px] overflow-y-auto pr-3 custom-scrollbar">
                                        
                                        <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                            <label className="text-[10px] font-bold text-gray-500 uppercase mb-3 block tracking-widest text-center">Kolory Czcionek</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="flex flex-col items-center">
                                                    <input type="color" value={diplomaTextColor} onChange={e => setDiplomaTextColor(e.target.value)} className="w-full h-10 rounded-lg cursor-pointer bg-white p-1 border shadow-sm" />
                                                    <span className="text-[9px] mt-1 font-bold text-gray-400 uppercase">Dyplom</span>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <input type="color" value={garlandTextColor} onChange={e => setGarlandTextColor(e.target.value)} className="w-full h-10 rounded-lg cursor-pointer bg-white p-1 border shadow-sm" />
                                                    <span className="text-[9px] mt-1 font-bold text-gray-400 uppercase">Girlanda</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100/50">
                                            <label className="text-[10px] font-bold text-indigo-800 uppercase mb-3 block tracking-widest text-center">Styl Obramowania</label>
                                            <div className="grid grid-cols-4 gap-2">
                                                <button onClick={() => setBorderWidth(0)} className={`py-2 rounded-lg text-[9px] font-bold uppercase border transition-all ${borderWidth === 0 ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>Brak</button>
                                                <button onClick={() => {setBorderStyle('solid'); setBorderWidth(4);}} className={`py-2 rounded-lg text-[9px] font-bold uppercase border transition-all ${borderWidth === 4 ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>Cienki</button>
                                                <button onClick={() => {setBorderStyle('solid'); setBorderWidth(16);}} className={`py-2 rounded-lg text-[9px] font-bold uppercase border transition-all ${borderWidth === 16 && borderStyle === 'solid' ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>Gruby</button>
                                                <button onClick={() => {setBorderStyle('dashed'); setBorderWidth(16);}} className={`py-2 rounded-lg text-[9px] font-bold uppercase border transition-all ${borderStyle === 'dashed' ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>Kreski</button>
                                            </div>
                                        </div>

                                        <div className={`space-y-4 pt-2 ${previewMode === 'garland' ? 'opacity-40 grayscale pointer-events-none' : ''}`}>
                                            <div className="border-b border-gray-100 pb-2 mb-2"><span className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Szyba Dyplomu</span></div>
                                            <div>
                                                <div className="flex justify-between text-[9px] font-bold text-gray-400 mb-1 uppercase"><span>Przezroczystość tła szyby</span><span>{boxOpacity}%</span></div>
                                                <input type="range" min="0" max="100" value={boxOpacity} onChange={e => setBoxOpacity(Number(e.target.value))} className="w-full accent-indigo-600 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-[9px] font-bold text-gray-400 mb-1 uppercase"><span>Rozmiar szyby w %</span><span>{boxWidth}%</span></div>
                                                <input type="range" min="50" max="100" value={boxWidth} onChange={e => setBoxWidth(Number(e.target.value))} className="w-full accent-indigo-600 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-[9px] font-bold text-gray-400 mb-1 uppercase"><span>Pozycja szyby góra/dół</span></div>
                                                <input type="range" min="-300" max="300" value={boxOffset} onChange={e => setBoxOffset(Number(e.target.value))} className="w-full accent-indigo-600 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                        </div>

                                        <div className={`space-y-4 pt-2 ${previewMode === 'diploma' ? 'opacity-40 grayscale pointer-events-none' : ''}`}>
                                            <div className="border-b border-gray-100 pb-2 mb-2"><span className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Wielkość Litery Girlandy</span></div>
                                            <input type="range" min="50" max="400" value={garlandLetterSize} onChange={e => setGarlandLetterSize(Number(e.target.value))} className="w-full accent-indigo-600 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                        </div>
                                    </div>
                                )}
                            </div>

                            <button onClick={() => window.print()} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-black text-sm tracking-widest flex items-center justify-center space-x-3 shadow-xl shadow-indigo-200 transition-all active:scale-95 mt-auto">
                                <Icon name="Printer" size={22} /><span>WYDRUKUJ PROJEKT</span>
                            </button>
                        </div>

                        {/* Obszar Podglądu (Prawy Panel) */}
                        <div className="lg:col-span-8 flex justify-center items-start">
                            {previewMode === 'diploma' ? (
                                <div 
                                    id="print-area"
                                    className={`relative flex flex-col justify-between ${diplomaOrientation === 'horizontal' ? 'w-full aspect-[1.414]' : 'w-[85%] mx-auto aspect-[0.707]'} ${activeTheme.bg} rounded-[2.5rem] p-10 md:p-14 text-center shadow-2xl shadow-gray-200 transition-all duration-500 overflow-hidden bg-cover bg-center bg-no-repeat`}
                                    style={{ 
                                        borderWidth: `${borderWidth}px`,
                                        borderStyle: borderStyle,
                                        borderColor: activeTheme.borderHex,
                                        color: diplomaTextColor
                                    }}
                                >
                                    {/* Grafiki Tła (z Motywów) */}
                                    {!customImage && (
                                        <div className="absolute inset-0 z-0 pointer-events-none opacity-[0.15] flex items-center justify-center space-x-32 scale-150">
                                            <div className="text-[15rem] drop-shadow-md">{activeTheme.elements[0]}</div>
                                            <div className="text-[15rem] drop-shadow-md">{activeTheme.elements[1]}</div>
                                        </div>
                                    )}

                                    {/* Ilustracja AI */}
                                    {customImage && (
                                        <div className="absolute inset-0 z-10 pointer-events-none">
                                            {graphicLayout === 'full_background' ? (
                                                <img src={customImage} className="w-full h-full object-cover opacity-100" />
                                            ) : graphicLayout === 'bottom_corners' ? (
                                                <>
                                                    <img src={customImage} className="absolute bottom-[-1rem] left-[-2rem] w-80 h-80 object-contain rotate-6 drop-shadow-2xl" />
                                                    <img src={customImage} className="absolute bottom-[-1rem] right-[-2rem] w-80 h-80 object-contain -rotate-12 drop-shadow-2xl" />
                                                </>
                                            ) : graphicLayout === 'bottom_center' ? (
                                                <img src={customImage} className="absolute bottom-[-2rem] left-1/2 -translate-x-1/2 w-[35rem] h-[35rem] object-contain drop-shadow-2xl" />
                                            ) : null}
                                        </div>
                                    )}

                                    {/* Znak wodny wersji darmowej */}
                                    {!isPremium && <div className="absolute inset-0 z-50 flex items-center justify-center opacity-[0.04] rotate-[-35deg] text-6xl font-black uppercase pointer-events-none select-none tracking-[2rem]">EDUGENERATOR.PL</div>}

                                    {/* Rozwiązanie problemu rozjeżdżania się layoutu: flex-shrink-0 dla nagłówka i stopki, my-auto dla szyby */}
                                    
                                    {/* Nagłówek Dyplomu */}
                                    <div className="z-20 relative pt-2 flex-shrink-0 space-y-2">
                                        <h1 style={{ fontSize: `${titleSize}px`, color: diplomaTextColor }} className="font-black tracking-[0.25em] uppercase leading-none drop-shadow-sm select-none break-words max-w-full">{diplomaTitle}</h1>
                                        <h3 className="text-xl md:text-2xl font-bold opacity-80 uppercase tracking-widest min-h-[1.5em] select-none break-words max-w-full" style={{ color: diplomaTextColor }}>{diplomaSubtitle}</h3>
                                    </div>

                                    {/* Szyba (Glassmorphism) - Elastyczna struktura zapobiegająca wychodzeniu tekstu */}
                                    <div 
                                        className="z-20 relative mx-auto flex flex-col items-center justify-center transition-all duration-300 py-6 px-8 md:py-10 md:px-14 rounded-[2rem] border border-white/40 shadow-xl my-auto flex-grow-0"
                                        style={{ 
                                            width: `${boxWidth}%`,
                                            transform: `translateY(${boxOffset}px)`, 
                                            backgroundColor: `rgba(255,255,255,${boxOpacity/100})`, 
                                            backdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*16}px)` : 'none',
                                            WebkitBackdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*16}px)` : 'none',
                                            boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.15)'
                                        }}
                                    >
                                        <div className="text-[12px] font-bold uppercase tracking-widest opacity-50 mb-2 md:mb-4">Przyznany dla:</div>
                                        <h2 style={{ fontSize: `${nameSize}px`, color: diplomaTextColor }} className="font-black border-b-2 border-gray-300/50 inline-block px-8 md:px-16 pb-2 md:pb-4 mb-4 md:mb-6 leading-tight w-full break-words select-none max-w-full">{studentName}</h2>
                                        <p style={{ fontSize: `${reasonSize}px`, color: diplomaTextColor }} className="font-bold leading-snug md:leading-relaxed max-w-3xl select-none opacity-90 break-words max-w-full">{diplomaReason}</p>
                                    </div>

                                    {/* Stopka Dyplomu */}
                                    <div className="z-20 relative flex justify-between items-end px-4 md:px-12 pb-2 flex-shrink-0 w-full select-none">
                                        <div className="text-center w-64 border-t-2 pt-3" style={{ borderColor: `${diplomaTextColor}40` }}>
                                            <div className="font-bold text-lg mb-1" style={{ color: diplomaTextColor }}>{diplomaDate}</div>
                                            <div className="text-[9px] font-black uppercase opacity-50 tracking-wider" style={{ color: diplomaTextColor }}>Miejscowość i data</div>
                                        </div>
                                        
                                        {/* Poprawiona Pieczęć zgodna ze screenem */}
                                        <div className="w-28 h-28 rounded-full border-4 border-red-500/40 flex items-center justify-center rotate-[-15deg] font-black text-[11px] p-2 bg-white/60 shadow-inner text-center z-30" style={{ color: '#ef4444', lineHeight: '1.2' }}>
                                            <span className="drop-shadow-sm">PIECZĘĆ<br/>PLACÓWKI</span>
                                        </div>
                                        
                                        <div className="text-center w-64 border-t-2 pt-3" style={{ borderColor: `${diplomaTextColor}40` }}>
                                            <div className="font-signature font-bold text-3xl mb-1 opacity-90" style={{ color: diplomaTextColor }}>{diplomaSignature}</div>
                                            <div className="text-[9px] font-black uppercase opacity-50 tracking-wider" style={{ color: diplomaTextColor }}>Podpis Nauczyciela</div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div id="print-area" className="grid grid-cols-1 gap-12 print:block w-full flex flex-col items-center overflow-visible mt-4">
                                    {garlandText.split('').map((letter, idx) => (
                                        <div key={idx} className="page-break relative aspect-[0.707] w-[80%] mx-auto flex items-center justify-center bg-transparent print:w-[210mm] print:h-[297mm]">
                                            <div className="w-full h-full flex items-center justify-center relative">
                                                {renderGarlandShape(letter)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
