<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Biblioteki i Style -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Balsamiq+Sans:wght@400;700&family=Caveat:wght@400..700&family=Cinzel:wght@400..900&family=Dancing+Script:wght@400..700&family=Pacifico&family=Patrick+Hand&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        .font-pacifico { font-family: 'Pacifico', cursive; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-caveat { font-family: 'Caveat', cursive; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-dancing { font-family: 'Dancing Script', cursive; }
        .font-patrick { font-family: 'Patrick Hand', cursive; }
        .font-amatic { font-family: 'Amatic SC', cursive; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; border: none !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            .print-hidden { display: none !important; }
            .garland-page { page-break-after: always; height: 100vh; display: flex; align-items: center; justify-content: center; visibility: visible !important; }
            .garland-page * { visibility: visible !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- KOMPONENTY IKON (INLINE SVG Z POPRAWIONYMI FRAGMENTAMI) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Award: (
                    <>
                        <path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526M20 7a8 8 0 1 1-16 0 8 8 0 0 1 16 0z"/>

                    </>
                ),
                Type: (
                    <>
                        <polyline points="4 7 4 4 20 4 20 7"/>

                    <>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>

                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>

                        <circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/>
                        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.688-1.688h1.906c3.11 0 5.625-2.515 5.625-5.625 0-4.75-4.477-8.75-10-8.75z"/>
                    </>
                ),
                Wand2: (
                    <>
                        <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.21 1.21 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72ZM14 7l3 3M5 6v1M19 2v1M10 2v2M7 10H6M22 9h-2M15 2h1"/>
                    </>
                ),
                UserSquare2: (
                    <>
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="12" cy="10" r="3"/>
                        <path d="M7 21v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>
                    </>
                ),
                MoveVertical: (
                    <>
                        <polyline points="8 18 12 22 16 18"/>
                        <polyline points="8 6 12 2 16 6"/>
                        <line x1="12" y1="2" x2="12" y2="22"/>
                    </>
                ),
                Scaling: (
                    <>
                        <path d="M21 3 9 15M12 3H3v9M16 3h5v5M14 15H9v-5M8 21H3v-5M15 11l6 6"/>
                    </>
                ),
                Sliders: (
                    <>
                        <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="2" y1="14" x2="6" y2="14"/><line x1="10" y1="12" x2="14" y2="12"/><line x1="18" y1="16" x2="22" y2="16"/>
                    </>
                ),
                Key: <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5L15.5 7.5z"/>
            };

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        // --- KONFIGURACJA TWOJEJ APLIKACJI ---
        const BUY_COFFEE_USERNAME = "magiccolor"; 
        const PREMIUM_SECRET_CODE = "KAWA2024"; 

        const THEMES = [
          { id: 'classic', name: 'Elegancki', bg: 'bg-blue-50', border: 'border-blue-400', style: 'border-solid', elements: [] },
          { id: 'pasowanie', name: 'Pasowanie', bg: 'bg-indigo-50', border: 'border-indigo-500', style: 'border-solid', elements: ['🎒', '🖍️', '📚', '🎨', '🧒', '🧩'] },
          { id: 'family', name: 'Dzień Rodziny', bg: 'bg-rose-50', border: 'border-rose-400', style: 'border-solid', elements: ['❤️', '👨‍👩‍👧‍👦', '🏡', '🌸', '💕', '✨'] },
          { id: 'kropka', name: 'Dzień Kropki', bg: 'bg-red-50', border: 'border-red-500', style: 'border-dotted', elements: ['🔴', '🟡', '🔵', '🟢', '🟣', '🟠'] },
          { id: 'apple', name: 'Dzień Jabłka', bg: 'bg-red-50', border: 'border-red-500', style: 'border-solid', elements: ['🍎', '🍏', '🥧', '🌳', '🍎', '🐛'] },
          { id: 'pumpkin', name: 'Dzień Dyni', bg: 'bg-orange-50', border: 'border-orange-500', style: 'border-solid', elements: ['🎃', '🍂', '🥧', '🍁', '🎃', '🌻'] },
          { id: 'bear', name: 'Dzień Misia', bg: 'bg-amber-50', border: 'border-amber-600', style: 'border-dashed', elements: ['🧸', '🍯', '🐾', '🤎', '🐻', '✨'] },
          { id: 'dino', name: 'Dzień Dinozaura', bg: 'bg-green-100', border: 'border-green-700', style: 'border-dashed', elements: ['🦕', '🦖', '🌿', '🌋', '🌴', '🦴'] },
          { id: 'water', name: 'Dzień Wody', bg: 'bg-cyan-50', border: 'border-cyan-500', style: 'border-solid', elements: ['💧', '🌊', '🐟', '🌧️', '🧊', '🫧'] },
          { id: 'space', name: 'Dzień Kosmosu', bg: 'bg-indigo-900', text: 'text-white', border: 'border-indigo-400', style: 'border-dashed', elements: ['🚀', '⭐', '🌎', '🛸', '🌙', '👨‍🚀'] },
          { id: 'boho', name: 'Styl Boho', bg: 'bg-[#FAF9F6]', border: 'border-[#D4B895]', style: 'border-solid', elements: ['🌿', '☀️', '🤎', '🍂', '✨', '🌈'] },
          { id: 'watercolor', name: 'Akwarelowy Sen', bg: 'bg-gradient-to-br from-pink-100 via-purple-50 to-blue-100', border: 'border-white', style: 'border-solid', elements: ['☁️', '✨', '🎨', '💧', '🦄', '🌟'] }
        ];

        const makeWhiteTransparent = (imageSrc) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) data[i+3] = 0;
                        else if (data[i] > 220 && data[i+1] > 220 && data[i+2] > 220) data[i+3] = 150;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => resolve(imageSrc);
                img.src = imageSrc;
            });
        };

        function App() {
            const [activeTab, setActiveTab] = useState('diploma');
            const [previewMode, setPreviewMode] = useState('diploma');
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            
            const [diplomaTitle, setDiplomaTitle] = useState('DYPLOM');
            const [diplomaSubtitle, setDiplomaSubtitle] = useState('ZA WYBITNE OSIĄGNIĘCIA');
            const [studentName, setStudentName] = useState('Jan Kowalski');
            const [diplomaReason, setDiplomaReason] = useState('za udział w konkursie plastycznym "Wiosna w przedszkolu" i przygotowanie najpiękniejszej pracy.');
            const [diplomaDate, setDiplomaDate] = useState('29 Marca 2026');
            const [diplomaSignature, setDiplomaSignature] = useState('Wychowawca');
            
            const [titleSize, setTitleSize] = useState(60);
            const [nameSize, setNameSize] = useState(48);
            const [reasonSize, setReasonSize] = useState(20);
            const [boxWidth, setBoxWidth] = useState(100); 
            const [boxOffset, setBoxOffset] = useState(0); 
            const [boxOpacity, setBoxOpacity] = useState(85); 

            const [selectedThemeId, setSelectedThemeId] = useState('watercolor');
            const [selectedFont, setSelectedFont] = useState('font-sans');
            const [customBorder, setCustomBorder] = useState('theme'); 
            const [customBorderWidth, setCustomBorderWidth] = useState('border-[12px]');
            const [cornerShape, setCornerShape] = useState('rounded-3xl'); 
            const [customBgColor, setCustomBgColor] = useState('');
            const [customTextColor, setCustomTextColor] = useState('');
            const [artStyle, setArtStyle] = useState('watercolor'); 
            const [graphicLayout, setGraphicLayout] = useState('bottom_corners'); 
            const [diplomaOrientation, setDiplomaOrientation] = useState('horizontal');
            const [ageGroup, setAgeGroup] = useState('przedszkole');

            const [aiPrompt, setAiPrompt] = useState('');
            const [customImage, setCustomImage] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);

            const [garlandText, setGarlandText] = useState('WITAJCIE');
            const [garlandShape, setGarlandShape] = useState('triangle'); 

            const activeTheme = THEMES.find(t => t.id === selectedThemeId) || THEMES[0];
            const isDarkTheme = activeTheme.id === 'space';

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === PREMIUM_SECRET_CODE.toUpperCase()) {
                    setIsPremium(true);
                    setAccessCode('');
                    alert('Odblokowano wersję Premium!');
                } else {
                    alert('Nieprawidłowy kod!');
                }
            };

            const handleGenerateAiImage = async () => {
                if (!aiPrompt.trim()) return;
                setIsGenerating(true);
                setCustomImage(null);
                const apiKey = ""; 
                let layoutModifier = graphicLayout === 'full_background' ? "full frame background scene, no white" : "single object, isolated on white background";
                const fullPrompt = `${aiPrompt} - child style ${ageGroup}, ${artStyle} art, ${layoutModifier}`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: [{ prompt: fullPrompt }], parameters: { sampleCount: 1 } })
                    });
                    const result = await response.json();
                    const base64Image = result.predictions?.[0]?.bytesBase64Encoded;
                    if (base64Image) {
                        const rawImage = `data:image/png;base64,${base64Image}`;
                        if (graphicLayout === 'full_background') setCustomImage(rawImage);
                        else setCustomImage(await makeWhiteTransparent(rawImage));
                    }
                } catch (error) { console.error(error); } finally { setIsGenerating(false); }
            };

            const finalBorderStyle = customBorder === 'theme' ? activeTheme.style : (customBorder === 'none' ? 'border-none' : `border-${customBorder}`);
            const finalBorderWidth = customBorder === 'none' ? 'border-0' : customBorderWidth;

            return (
                <div className={`min-h-screen bg-gray-50 text-gray-800 ${selectedFont}`}>
                    <nav className="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center print-hidden sticky top-0 z-50">
                        <div className="flex items-center space-x-2">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white"><Icon name="Award" /></div>
                            <span className="text-xl font-bold">Edu<span className="text-indigo-600">Generator</span></span>
                        </div>
                        <div className="flex items-center space-x-4">
                            {!isPremium ? (
                                <div className="flex items-center space-x-2">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod..." className="p-2 border rounded-lg text-sm w-24 outline-none"/>
                                    <button onClick={handleVerifyCode} className="p-2 bg-indigo-600 text-white rounded-lg"><Icon name="Key" size={16}/></button>
                                    <button onClick={() => window.open(`https://buycoffee.to/${BUY_COFFEE_USERNAME}`)} className="flex items-center space-x-2 bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-bold shadow-sm">
                                        <Icon name="Coffee" size={20} /><span>Postaw kawę</span>
                                    </button>
                                </div>
                            ) : (
                                <div className="text-green-600 font-bold px-4 py-2 bg-green-50 rounded-full border border-green-200 flex items-center space-x-2">
                                    <Icon name="CheckCircle2" size={20} /><span>Wersja Premium</span>
                                </div>
                            )}
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-6 print:block">
                        <div className="lg:col-span-4 space-y-4 print-hidden">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-indigo-100 space-y-4 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                                <h2 className="font-bold flex items-center"><Icon name="Palette" size={16} className="mr-2 text-indigo-500"/> Główne Ustawienia</h2>
                                <select value={ageGroup} onChange={e => setAgeGroup(e.target.value)} className="w-full p-2 border-2 border-indigo-50 rounded-lg text-sm">
                                    <option value="zlobek">👶 Żłobek</option><option value="przedszkole">🎈 Przedszkole</option><option value="szkola">🎒 Szkoła 1-3</option><option value="starszaki">🎓 Starszaki</option>
                                </select>
                                <select value={artStyle} onChange={e => setArtStyle(e.target.value)} className="w-full p-2 border-2 border-indigo-50 rounded-lg text-sm">
                                    <option value="watercolor">🎨 Akwarela</option><option value="boho">🤎 Boho</option><option value="vibrant">🌈 Wyraziste</option><option value="doodle">✏️ Doodle</option><option value="papercraft">✂️ Wycinanka</option>
                                </select>
                                <div className="flex space-x-2">
                                    <select value={graphicLayout} onChange={e => setGraphicLayout(e.target.value)} className="flex-1 p-2 border-2 border-indigo-50 rounded-lg text-xs">
                                        <option value="bottom_corners">✨ Rogi</option><option value="bottom_center">🌟 Dół</option><option value="full_background">🖼️ Całe Tło</option>
                                    </select>
                                    <select value={diplomaOrientation} onChange={e => setDiplomaOrientation(e.target.value)} className="flex-1 p-2 border-2 border-indigo-50 rounded-lg text-xs">
                                        <option value="horizontal">Poziom</option><option value="vertical">Pion</option>
                                    </select>
                                </div>
                            </div>

                            <div className="bg-white p-2 rounded-2xl shadow-sm border flex flex-wrap gap-2">
                                <button onClick={() => {setActiveTab('diploma'); setPreviewMode('diploma');}} className={`flex-1 py-3 rounded-xl flex flex-col items-center justify-center ${activeTab === 'diploma' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500'}`}><Icon name="Award" size={18}/><span className="text-[10px] mt-1">Treść</span></button>
                                <button onClick={() => {setActiveTab('garland'); setPreviewMode('garland');}} className={`flex-1 py-3 rounded-xl flex flex-col items-center justify-center ${activeTab === 'garland' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500'}`}><Icon name="Type" size={18}/><span className="text-[10px] mt-1">Girlanda</span></button>
                                <button onClick={() => setActiveTab('style')} className={`flex-1 py-3 rounded-xl flex flex-col items-center justify-center ${activeTab === 'style' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500'}`}><Icon name="Wand2" size={18}/><span className="text-[10px] mt-1">AI</span></button>
                                <button onClick={() => setActiveTab('adjust')} className={`flex-1 py-3 rounded-xl flex flex-col items-center justify-center ${activeTab === 'adjust' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500'}`}><Icon name="Sliders" size={18}/><span className="text-[10px] mt-1">Dopracuj</span></button>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                {activeTab === 'diploma' && (
                                    <div className="space-y-4">
                                        <input type="text" value={diplomaTitle} onChange={e => setDiplomaTitle(e.target.value)} placeholder="Nagłówek" className="w-full p-2 border rounded-lg" />
                                        <input type="text" value={studentName} onChange={e => setStudentName(e.target.value)} placeholder="Imię i Nazwisko" className="w-full p-2 border rounded-lg font-bold" />
                                        <textarea value={diplomaReason} onChange={e => setDiplomaReason(e.target.value)} rows="3" className="w-full p-2 border rounded-lg" />
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="text" value={diplomaDate} onChange={e => setDiplomaDate(e.target.value)} className="p-2 border rounded-lg text-sm" />
                                            <input type="text" value={diplomaSignature} onChange={e => setDiplomaSignature(e.target.value)} className="p-2 border rounded-lg text-sm" />
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'style' && (
                                    <div className="space-y-4">
                                        <div className="flex space-x-2">
                                            <input type="text" value={aiPrompt} onChange={e => setAiPrompt(e.target.value)} placeholder="Opisz grafikę..." className="flex-1 p-2 border rounded-lg text-sm" />
                                            <button onClick={handleGenerateAiImage} disabled={isGenerating} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">{isGenerating ? '...' : 'Rysuj'}</button>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                                            {THEMES.map(t => (
                                                <button key={t.id} onClick={() => {setSelectedThemeId(t.id); setCustomImage(null);}} className={`p-2 rounded-lg border-2 flex flex-col items-center ${selectedThemeId === t.id ? 'border-indigo-600 bg-indigo-50' : 'border-gray-100'}`}>
                                                    <span className="text-xl">{t.elements[0] || '📜'}</span>
                                                    <span className="text-[8px] truncate w-full">{t.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'adjust' && (
                                    <div className="space-y-4">
                                        <div className="flex gap-2">
                                            <div className="flex-1 p-2 bg-gray-50 rounded border flex items-center gap-2"><input type="color" value={customBgColor || '#ffffff'} onChange={e => setCustomBgColor(e.target.value)} className="w-6 h-6 border-0 p-0"/><span className="text-xs">Tło</span></div>
                                            <div className="flex-1 p-2 bg-gray-50 rounded border flex items-center gap-2"><input type="color" value={customTextColor || '#000000'} onChange={e => setCustomTextColor(e.target.value)} className="w-6 h-6 border-0 p-0"/><span className="text-xs">Tekst</span></div>
                                        </div>
                                        <div><label className="text-[10px] font-bold">Wielkość Tytułu: {titleSize}px</label><input type="range" min="30" max="140" value={titleSize} onChange={e => setTitleSize(Number(e.target.value))} className="w-full accent-indigo-600" /></div>
                                        <div><label className="text-[10px] font-bold">Szerokość Pola: {boxWidth}%</label><input type="range" min="40" max="100" value={boxWidth} onChange={e => setBoxWidth(Number(e.target.value))} className="w-full accent-indigo-600" /></div>
                                        <div><label className="text-[10px] font-bold">Przezroczystość: {boxOpacity}%</label><input type="range" min="0" max="100" value={boxOpacity} onChange={e => setBoxOpacity(Number(e.target.value))} className="w-full accent-indigo-600" /></div>
                                    </div>
                                )}
                            </div>

                            <button onClick={() => window.print()} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-bold flex items-center justify-center space-x-2 shadow-lg">
                                <Icon name="Printer" size={20} /><span>DRUKUJ PROJEKT</span>
                            </button>
                        </div>

                        <div className="lg:col-span-8 print:w-full">
                            {previewMode === 'diploma' && (
                                <div 
                                    id="print-area"
                                    className={`relative ${diplomaOrientation === 'horizontal' ? 'w-full aspect-[1.414]' : 'w-[85%] mx-auto aspect-[0.707]'} ${!customBgColor ? activeTheme.bg : ''} ${finalBorderWidth} ${activeTheme.border} ${finalBorderStyle} ${cornerShape} p-12 flex flex-col items-center justify-between text-center shadow-2xl print:shadow-none print:aspect-auto overflow-hidden transition-all duration-300`}
                                    style={{ backgroundColor: customBgColor || undefined, color: customTextColor || undefined, borderColor: customTextColor || undefined }}
                                >
                                    {customImage && graphicLayout === 'full_background' ? (
                                        <img src={customImage} className="absolute inset-0 w-full h-full object-cover z-0" />
                                    ) : customImage ? (
                                        <div className="absolute inset-0 flex items-center justify-center opacity-10 z-0"><img src={customImage} className="w-[500px] h-[500px] object-contain rotate-12" /></div>
                                    ) : activeTheme.elements.length > 0 && (
                                        <div className="absolute inset-0 flex items-center justify-center space-x-12 opacity-10 z-0"><div className="text-9xl">{activeTheme.elements[0]}</div></div>
                                    )}

                                    {!isPremium && <div className="absolute inset-0 z-50 flex items-center justify-center opacity-[0.07] rotate-[-30deg] text-5xl font-black uppercase pointer-events-none">EDUGENERATOR.PL</div>}

                                    <div className="z-30 relative w-full">
                                        <h1 style={{ fontSize: `${titleSize}px` }} className="font-bold tracking-widest uppercase mb-2">{diplomaTitle}</h1>
                                        <h3 className="text-xl font-bold opacity-80 uppercase tracking-widest">{diplomaSubtitle}</h3>
                                    </div>

                                    <div 
                                        className={`z-30 p-8 ${cornerShape} border-2 ${activeTheme.border} shadow-sm mx-auto my-auto`}
                                        style={{ 
                                            width: `${boxWidth}%`, transform: `translateY(${boxOffset}px)`, 
                                            backgroundColor: `rgba(255,255,255,${boxOpacity/100})`, 
                                            backdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*12}px)` : 'none',
                                            WebkitBackdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*12}px)` : 'none'
                                        }}
                                    >
                                        <p className="mb-4 italic opacity-60 font-bold">Przyznany dla:</p>
                                        <h2 style={{ fontSize: `${nameSize}px` }} className="font-bold border-b-2 border-gray-300 inline-block px-12 pb-4 mb-6">{studentName}</h2>
                                        <p style={{ fontSize: `${reasonSize}px` }} className="font-bold leading-relaxed">{diplomaReason}</p>
                                    </div>

                                    <div className="z-30 relative w-full flex justify-between items-end px-12">
                                        <div className="text-center w-64 border-t-2 border-gray-400 pt-2"><div className="font-bold text-xl">{diplomaDate}</div><div className="text-[10px] font-black uppercase opacity-60">Data</div></div>
                                        <div className="w-24 h-24 rounded-full border-4 border-red-500/30 flex items-center justify-center text-red-600 rotate-[-15deg] font-black text-xs p-2 hidden sm:flex">DOKUMENT</div>
                                        <div className="text-center w-64 border-t-2 border-gray-400 pt-2"><div className="font-signature font-bold text-2xl">{diplomaSignature}</div><div className="text-[10px] font-black uppercase opacity-60">Podpis</div></div>
                                    </div>
                                </div>
                            )}

                            {previewMode === 'garland' && (
                                <div id="print-area" className="grid grid-cols-1 gap-4 print:block">
                                    {garlandText.split('').map((letter, idx) => (
                                        <div key={idx} className="garland-page relative aspect-[0.707] w-full flex items-center justify-center p-8 bg-white shadow-lg print:shadow-none print:w-[210mm] print:h-[297mm]">
                                            <div 
                                                className={`w-full h-full border-8 ${activeTheme.border} flex flex-col items-center justify-center overflow-hidden transition-all duration-300
                                                    ${garlandShape === 'triangle' ? 'clip-triangle' : ''}
                                                    ${garlandShape === 'trapezoid' ? 'clip-trapezoid' : ''}
                                                    ${garlandShape === 'circle' ? 'rounded-full' : 'rounded-2xl'}
                                                `}
                                                style={{ 
                                                    backgroundColor: customBgColor || (isDarkTheme ? '#1e1b4b' : '#f8fafc'),
                                                    borderColor: customTextColor || undefined
                                                }}
                                            >
                                                <div className="z-10 bg-white/60 backdrop-blur-md rounded-full w-48 h-48 flex items-center justify-center border-4 border-dashed border-indigo-200">
                                                    <span style={{color: customTextColor || undefined}} className="text-9xl font-black">{letter}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    <style dangerouslySetInnerHTML={{__html: `
                                        .clip-triangle { clip-path: polygon(0% 0%, 100% 0%, 50% 100%); }
                                        .clip-trapezoid { clip-path: polygon(0% 0%, 100% 0%, 75% 100%, 25% 100%); }
                                    `}} />
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
