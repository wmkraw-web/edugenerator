        function App() {
            const [activeTab, setActiveTab] = useState('diploma');
            const [previewMode, setPreviewMode] = useState('diploma');
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            
            // Dane Dyplomu

            const [artStyle, setArtStyle] = useState('pastel_pinterest');

            const [diplomaOrientation, setDiplomaOrientation] = useState('horizontal');
            const [ageGroup, setAgeGroup] = useState('przedszkole');

            // AI i Obrazy
            const [aiPrompt, setAiPrompt] = useState('');
            const [customImage, setCustomImage] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);

            // Dane Girlandy
            const [garlandText, setGarlandText] = useState('WITAJCIE');
            const [garlandShape, setGarlandShape] = useState('triangle'); 

            const activeTheme = THEMES.find(t => t.id === selectedThemeId) || THEMES[0];

            useEffect(() => {
                setGarlandTextColor(activeTheme.borderHex);
            }, [selectedThemeId]);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { setIsPremium(true); setAccessCode(''); }
                else alert('Błędny kod!');
            };

            const handleGenerateAiImage = async () => {
                if (!aiPrompt.trim()) return;
                setIsGenerating(true);
                const apiKey = ""; 
                const styleMap = {
                    boho: "earthy boho style, natural tones, soft lines",
                    pastel_pinterest: "soft pastel aesthetic, pinterest style, dreamy colors",
                    vibrant_sharp: "vibrant bold sharp colors, professional vector style",
                    watercolor: "soft artistic watercolor style, traditional textures"
                };
                const agePrompts = {
                    zlobek: "very simple bold shapes for babies/nursery, minimal detail",
                    przedszkole: "playful cute kindergarten style, cheerful colors",
                    szkola: "educational illustration for primary school, clean professional look"
                };
                const finalPrompt = `${aiPrompt} - ${styleMap[artStyle]} - ${agePrompts[ageGroup]} - single object on pure white background, masterpiece illustration`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: [{ prompt: finalPrompt }], parameters: { sampleCount: 1 } })
                    });
                    const result = await response.json();
                    if (result.predictions?.[0]?.bytesBase64Encoded) {
                        setCustomImage(`data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`);
                    }
                } catch (e) { console.error(e); } finally { setIsGenerating(false); }
            };

            const renderGarlandShape = (letter) => {
                let fillVal = '#ffffff';
                if (activeTheme.id === 'boho') fillVal = '#FAF9F6';
                if (activeTheme.id === 'rodzina') fillVal = '#fff1f2';
                if (activeTheme.bg.includes('blue-50')) fillVal = '#eff6ff';

                let path = "M5,5 L95,5 L95,95 L5,95 Z";
                if (garlandShape === 'triangle') path = "M5,5 L95,5 L50,95 Z";
                if (garlandShape === 'trapezoid') path = "M5,5 L95,5 L85,95 L15,95 Z";
                if (garlandShape === 'shield') path = "M5,5 L95,5 L95,80 L50,95 L5,80 Z";
                
                if (garlandShape === 'circle') return (
                    <div className="relative w-full h-full flex items-center justify-center p-4 overflow-hidden">
                        <div className="w-full h-full rounded-full border-8 shadow-sm flex items-center justify-center" style={{borderColor: activeTheme.borderHex, borderStyle: borderStyle, borderWidth: borderWidth, backgroundColor: fillVal}}>

                                <span 
                                    className="font-black z-10 select-none leading-none" 
                                    style={{
                                        color: garlandTextColor, 
                                        fontSize: `${garlandLetterSize}px`,
                                        transform: `translateY(${garlandLetterOffset}px)`
                                    }}
                                >
                                    {letter}
                                </span>
                        </div>
                    </div>
                );

                return (
                    <div className="relative w-full h-full flex items-center justify-center p-4 overflow-hidden">
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg" preserveAspectRatio="none">
                            <path d={path} fill={fillVal} stroke={activeTheme.borderHex} strokeWidth={borderWidth/2} strokeDasharray={borderStyle === 'dashed' ? '5,5' : 'none'} />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                            {customImage && <img src={customImage} className="absolute inset-x-0 top-1/2 -translate-y-1/2 m-auto w-48 h-48 object-contain opacity-25 pointer-events-none" />}
                            <span 
                                className="font-black leading-none select-none" 
                                style={{
                                    color: garlandTextColor, 
                                    fontSize: `${garlandLetterSize}px`,
                                    transform: `translateY(${garlandLetterOffset}px)`
                                }}
                            >
                                {letter}
                            </span>
                        </div>
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col ${selectedFont}`}>
                    {/* Nawigacja */}
                    <nav className="bg-white border-b px-6 py-4 flex justify-between items-center print-hidden sticky top-0 z-50 shadow-sm">

                                <div className="grid grid-cols-2 gap-2">

                                            <option value="vertical">↕️ Pion</option>
                                        </select>
                                    </div>
                                    <div>

                                        <select value={selectedFont} onChange={e => setSelectedFont(e.target.value)} className="w-full p-2 border rounded-lg text-xs outline-none bg-gray-50">

                                            <option value="font-balsamiq">Balsamiq</option>

                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-indigo-600 block mb-1 uppercase">Układ Grafiki</label>
                                    <select value={graphicLayout} onChange={e => setGraphicLayout(e.target.value)} className="w-full p-2 border-2 border-indigo-100 rounded-lg text-xs outline-none bg-indigo-50/30">
                                        <option value="full_background">🖼️ Cała strona (Tło)</option>
                                        <option value="bottom_center">🌟 Środek (Duży)</option>
                                        <option value="bottom_corners">✨ Dolne rogi</option>
                                        <option value="top_corners">🔼 Górne rogi</option>
                                        <option value="corners">💠 Wszystkie rogi</option>
                                    </select>
                                </div>

                                <div className="p-3 bg-indigo-50 rounded-xl border border-indigo-100">
                                    <label className="text-[10px] font-bold text-indigo-600 block mb-2 uppercase tracking-widest text-center">Dla kogo rysuje AI?</label>
                                    <div className="grid grid-cols-3 gap-1">
                                        <button onClick={() => setAgeGroup('zlobek')} className={`p-2 border rounded-lg text-[8px] font-bold uppercase transition-all ${ageGroup === 'zlobek' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-400'}`}>👶 Żłobek</button>
                                        <button onClick={() => setAgeGroup('przedszkole')} className={`p-2 border rounded-lg text-[8px] font-bold uppercase transition-all ${ageGroup === 'przedszkole' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-400'}`}>🎈 Przedszkole</button>
                                        <button onClick={() => setAgeGroup('szkola')} className={`p-2 border rounded-lg text-[8px] font-bold uppercase transition-all ${ageGroup === 'szkola' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-400'}`}>🏫 Szkoła</button>
                                    </div>
                                </div>
                                
                                <div className="p-3 bg-gray-50 rounded-xl border border-gray-100">
                                    <label className="text-[10px] font-bold text-gray-500 block mb-2 uppercase tracking-widest text-center">Klimat Ilustracji</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setArtStyle('boho')} className={`p-2 border rounded-lg text-[8px] font-bold uppercase ${artStyle === 'boho' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-400'}`}>Boho</button>
                                        <button onClick={() => setArtStyle('pastel_pinterest')} className={`p-2 border rounded-lg text-[8px] font-bold uppercase ${artStyle === 'pastel_pinterest' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-400'}`}>Pinterest</button>
                                        <button onClick={() => setArtStyle('vibrant_sharp')} className={`p-2 border rounded-lg text-[8px] font-bold uppercase ${artStyle === 'vibrant_sharp' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-400'}`}>Wyraziste</button>
                                        <button onClick={() => setArtStyle('watercolor')} className={`p-2 border rounded-lg text-[8px] font-bold uppercase ${artStyle === 'watercolor' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-400'}`}>Akwarela</button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-2 rounded-2xl shadow-sm border flex gap-1">
                                <button onClick={() => {setActiveTab('diploma'); setPreviewMode('diploma');}} className={`flex-1 py-3 rounded-xl flex flex-col items-center justify-center text-[10px] font-bold uppercase ${activeTab === 'diploma' ? 'bg-indigo-50 text-indigo-700 shadow-inner' : 'text-gray-400'}`}><Icon name="Award" size={18} className="mb-1"/>Dyplom</button>
                                <button onClick={() => {setActiveTab('garland'); setPreviewMode('garland');}} className={`flex-1 py-3 rounded-xl flex flex-col items-center justify-center text-[10px] font-bold uppercase ${activeTab === 'garland' ? 'bg-indigo-50 text-indigo-700 shadow-inner' : 'text-gray-400'}`}><Icon name="Type" size={18} className="mb-1"/>Girlanda</button>
                                <button onClick={() => setActiveTab('themes')} className={`flex-1 py-3 rounded-xl flex flex-col items-center justify-center text-[10px] font-bold uppercase ${activeTab === 'themes' ? 'bg-indigo-50 text-indigo-700 shadow-inner' : 'text-gray-400'}`}><Icon name="Wand2" size={18} className="mb-1"/>Motywy</button>
                                <button onClick={() => setActiveTab('sliders')} className={`flex-1 py-3 rounded-xl flex flex-col items-center justify-center text-[10px] font-bold uppercase ${activeTab === 'sliders' ? 'bg-indigo-50 text-indigo-700 shadow-inner' : 'text-gray-400'}`}><Icon name="Sliders" size={18} className="mb-1"/>Szlify</button>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                {activeTab === 'diploma' && (
                                    <div className="space-y-4">
                                        <div><label className="text-[10px] font-bold text-gray-400 block mb-1 uppercase">Tytuł Główny</label><input type="text" value={diplomaTitle} onChange={e => setDiplomaTitle(e.target.value)} className="w-full p-2 border rounded-lg outline-none" /></div>
                                        <div><label className="text-[10px] font-bold text-indigo-600 block mb-1 uppercase tracking-widest">Podtytuł</label><input type="text" value={diplomaSubtitle} onChange={e => setDiplomaSubtitle(e.target.value)} className="w-full p-2 border-2 border-indigo-100 rounded-lg outline-none font-bold" /></div>
                                        <div><label className="text-[10px] font-bold text-indigo-600 block mb-1 uppercase">Imię i Nazwisko</label><input type="text" value={studentName} onChange={e => setStudentName(e.target.value)} className="w-full p-3 border-2 border-indigo-100 rounded-xl font-bold outline-none shadow-sm" /></div>
                                        <div><label className="text-[10px] font-bold text-gray-400 block mb-1 uppercase text-xs">Treść Podziękowania</label><textarea value={diplomaReason} onChange={e => setDiplomaReason(e.target.value)} rows="3" className="w-full p-2 border rounded-lg outline-none text-sm" /></div>
                                        <div className="grid grid-cols-2 gap-2 border-t pt-2">
                                            <div><label className="text-[10px] font-bold text-gray-400 block mb-1 uppercase text-[8px]">Miejscowość i Data</label><input type="text" value={diplomaDate} onChange={e => setDiplomaDate(e.target.value)} className="p-2 border rounded-lg text-xs w-full outline-none bg-gray-50" /></div>
                                            <div><label className="text-[10px] font-bold text-gray-400 block mb-1 uppercase text-[8px]">Podpis Nauczyciela</label><input type="text" value={diplomaSignature} onChange={e => setDiplomaSignature(e.target.value)} className="p-2 border rounded-lg text-xs w-full outline-none bg-gray-50" /></div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'garland' && (
                                    <div className="space-y-4">
                                        <div><label className="text-[10px] font-bold text-gray-400 block mb-1 uppercase">Tekst Girlandy</label><input type="text" value={garlandText} onChange={e => setGarlandText(e.target.value.toUpperCase())} className="w-full p-3 border-2 border-indigo-100 rounded-xl font-bold text-xl text-center outline-none tracking-[0.4rem] shadow-sm" /></div>
                                        <div><label className="text-[10px] font-bold text-gray-400 block mb-1 uppercase tracking-widest">Kształt Proporczyka</label>
                                            <div className="grid grid-cols-3 gap-1">
                                                {[
                                                    {id: 'triangle', n: 'Trójkąt'},
                                                    {id: 'trapezoid', n: 'Trapez'},
                                                    {id: 'shield', n: 'Tarcza'},
                                                    {id: 'circle', n: 'Koło'},
                                                    {id: 'square', n: 'Kwadrat'}
                                                ].map(s => (
                                                    <button key={s.id} onClick={() => setGarlandShape(s.id)} className={`p-2 border rounded-lg text-[8px] font-bold uppercase transition-all ${garlandShape === s.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-white'}`}>{s.n}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'themes' && (
                                    <div className="space-y-4">
                                        <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 shadow-sm">
                                            <label className="text-[10px] font-bold text-indigo-600 block mb-1 uppercase tracking-widest">Generator AI</label>
                                            <div className="flex space-x-2">
                                                <input type="text" value={aiPrompt} onChange={e => setAiPrompt(e.target.value)} placeholder="np. lisek z kwiatami" className="flex-1 p-2 border rounded-lg text-sm outline-none shadow-inner" />
                                                <button onClick={handleGenerateAiImage} disabled={isGenerating} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-indigo-700 disabled:bg-gray-400 transition-colors">{isGenerating ? '...' : 'Rysuj'}</button>
                                            </div>
                                        </div>
                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Baza Motywów</label>
                                        <div className="grid grid-cols-3 gap-2 max-h-[350px] overflow-y-auto pr-1 custom-scrollbar border-t pt-2">
                                            {THEMES.map(t => (
                                                <button key={t.id} onClick={() => {setSelectedThemeId(t.id); setCustomImage(null);}} className={`p-2 rounded-lg border-2 flex flex-col items-center transition-all ${selectedThemeId === t.id ? 'border-indigo-600 bg-indigo-50 shadow-inner' : 'border-gray-100'}`}>
                                                    <span className="text-xl">{t.elements[0]}</span>
                                                    <span className="text-[8px] truncate w-full text-center font-bold text-gray-700 leading-tight">{t.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'sliders' && (
                                    <div className="space-y-4 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
                                        {/* OBRAMOWANIE */}
                                        <div className="p-3 bg-indigo-50/50 rounded-xl border border-indigo-100 shadow-inner">
                                            <label className="text-[10px] font-bold text-indigo-700 uppercase mb-2 block tracking-widest text-center">Styl Obramowania</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                <button onClick={() => setBorderWidth(0)} className={`p-2 border rounded-lg text-[10px] font-bold uppercase transition-all ${borderWidth === 0 ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-indigo-400'}`}>Brak</button>
                                                <button onClick={() => {setBorderStyle('solid'); setBorderWidth(4);}} className={`p-2 border rounded-lg text-[10px] font-bold uppercase transition-all ${borderWidth === 4 ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-indigo-400'}`}>Cienka</button>
                                                <button onClick={() => {setBorderStyle('solid'); setBorderWidth(16);}} className={`p-2 border rounded-lg text-[10px] font-bold uppercase transition-all ${borderWidth === 16 && borderStyle === 'solid' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-indigo-400'}`}>Gruba</button>
                                                <button onClick={() => {setBorderStyle('dashed'); setBorderWidth(16);}} className={`p-2 border rounded-lg text-[10px] font-bold uppercase transition-all ${borderStyle === 'dashed' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-indigo-400'}`}>Przerywana</button>
                                            </div>
                                        </div>

                                        <div className="p-3 bg-gray-50 rounded-xl border">
                                            <label className="text-[10px] font-bold text-gray-500 uppercase mb-2 block tracking-widest text-center">Kolory Czcionek</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-[8px] font-bold text-gray-400 uppercase block mb-1">Dyplom</label>
                                                    <input type="color" value={diplomaTextColor} onChange={e => setDiplomaTextColor(e.target.value)} className="w-full h-8 rounded-lg cursor-pointer bg-white p-1 border" />
                                                </div>
                                                <div>
                                                    <label className="text-[8px] font-bold text-gray-400 uppercase block mb-1">Girlanda</label>
                                                    <input type="color" value={garlandTextColor} onChange={e => setGarlandTextColor(e.target.value)} className="w-full h-8 rounded-lg cursor-pointer bg-white p-1 border" />
                                                </div>
                                            </div>
                                        </div>

                                        {/* USTAWIENIA DYPLOMU */}
                                        <div className={`space-y-4 border-t pt-4 ${previewMode === 'garland' ? 'opacity-30 pointer-events-none' : ''}`}>
                                            <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Ustawienia Dyplomu</h4>
                                            <div><label className="text-[10px] font-bold text-gray-400 uppercase flex justify-between">Przezroczystość Szyby <span>{boxOpacity}%</span></label><input type="range" min="0" max="100" value={boxOpacity} onChange={e => setBoxOpacity(Number(e.target.value))} className="w-full accent-indigo-600" /></div>
                                            <div><label className="text-[10px] font-bold text-gray-400 uppercase flex justify-between">Rozmiar Tytułu <span>{titleSize}px</span></label><input type="range" min="30" max="140" value={titleSize} onChange={e => setTitleSize(Number(e.target.value))} className="w-full accent-indigo-600" /></div>
                                            <div><label className="text-[10px] font-bold text-gray-400 uppercase flex justify-between">Pozycja Szyby (Góra/Dół)</label><input type="range" min="-300" max="300" value={boxOffset} onChange={e => setBoxOffset(Number(e.target.value))} className="w-full accent-indigo-600" /></div>
                                        </div>

                                        {/* USTAWIENIA GIRLANDY */}
                                        <div className={`space-y-4 border-t pt-4 ${previewMode === 'diploma' ? 'opacity-30 pointer-events-none' : ''}`}>
                                            <h4 className="text-[10px] font-black text-indigo-400 uppercase tracking-widest text-center">Ustawienia Girlandy</h4>
                                            <div><label className="text-[10px] font-bold text-gray-400 uppercase flex justify-between">Wielkość litery <span>{garlandLetterSize}px</span></label><input type="range" min="50" max="600" value={garlandLetterSize} onChange={e => setGarlandLetterSize(Number(e.target.value))} className="w-full accent-indigo-600" /></div>
                                            <div><label className="text-[10px] font-bold text-gray-400 uppercase flex justify-between">Pozycja litery (Góra/Dół)</label><input type="range" min="-300" max="300" value={garlandLetterOffset} onChange={e => setGarlandLetterOffset(Number(e.target.value))} className="w-full accent-indigo-600" /></div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <button onClick={() => window.print()} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-bold flex items-center justify-center space-x-2 shadow-lg transition-all active:scale-95">
                                <Icon name="Printer" size={20} /><span>WYDRUKUJ PROJEKT</span>
                            </button>
                        </div>

                        {/* Obszar Podglądu */}
                        <div className="lg:col-span-8 flex justify-center">
                            {previewMode === 'diploma' ? (
                                <div 
                                    id="print-area"
                                    className={`relative flex flex-col justify-between ${diplomaOrientation === 'horizontal' ? 'w-full aspect-[1.414]' : 'w-[85%] mx-auto aspect-[0.707]'} ${activeTheme.bg} rounded-3xl p-12 text-center shadow-2xl transition-all duration-500 overflow-hidden`}
                                    style={{ 
                                        borderWidth: `${borderWidth}px`,
                                        borderStyle: borderStyle,
                                        borderColor: activeTheme.borderHex,
                                        color: diplomaTextColor
                                    }}
                                >
                                    {/* Grafiki Tła */}
                                    <div className="absolute inset-0 z-0 pointer-events-none opacity-20 flex items-center justify-center space-x-24">
                                        <div className="text-[15rem]">{activeTheme.elements[0]}</div>
                                        <div className="text-[15rem]">{activeTheme.elements[1]}</div>
                                    </div>

                                    {/* Ilustracja AI */}
                                    {customImage && (
                                        <div className="absolute inset-0 z-10 pointer-events-none">
                                            {graphicLayout === 'full_background' ? (
                                                <img src={customImage} className="w-full h-full object-cover opacity-100" />
                                            ) : graphicLayout === 'bottom_corners' ? (
                                                <>
                                                    <img src={customImage} className="absolute bottom-[-1rem] left-[-2rem] w-80 h-80 object-contain rotate-6 drop-shadow-xl" />
                                                    <img src={customImage} className="absolute bottom-[-1rem] right-[-2rem] w-80 h-80 object-contain -rotate-12 drop-shadow-xl" />
                                                </>
                                            ) : graphicLayout === 'bottom_center' ? (
                                                <img src={customImage} className="absolute bottom-[-2rem] left-1/2 -translate-x-1/2 w-[35rem] h-[35rem] object-contain drop-shadow-2xl" />
                                            ) : graphicLayout === 'top_corners' ? (
                                                <>
                                                    <img src={customImage} className="absolute top-[-1rem] left-[-2rem] w-64 h-64 object-contain -rotate-12 drop-shadow-lg" />
                                                    <img src={customImage} className="absolute top-[-1rem] right-[-2rem] w-64 h-64 object-contain rotate-12 drop-shadow-lg" />
                                                </>
                                            ) : (
                                                <>
                                                    <img src={customImage} className="absolute top-4 left-4 w-32 h-32 object-contain" />
                                                    <img src={customImage} className="absolute top-4 right-4 w-32 h-32 object-contain" />
                                                    <img src={customImage} className="absolute bottom-4 left-4 w-32 h-32 object-contain" />
                                                    <img src={customImage} className="absolute bottom-4 right-4 w-32 h-32 object-contain" />
                                                </>
                                            )}
                                        </div>
                                    )}

                                    {!isPremium && <div className="absolute inset-0 z-50 flex items-center justify-center opacity-[0.06] rotate-[-30deg] text-5xl font-black uppercase pointer-events-none select-none tracking-[1.5rem]">EDUGENERATOR.PL</div>}

                                    <div className="z-20 relative pt-4 space-y-4">
                                        <h1 style={{ fontSize: `${titleSize}px`, color: diplomaTextColor }} className="font-bold tracking-[0.2em] uppercase leading-none drop-shadow-sm select-none">{diplomaTitle}</h1>
                                        <h3 className="text-2xl font-bold opacity-90 uppercase tracking-widest min-h-[1.5em] select-none" style={{ color: diplomaTextColor }}>{diplomaSubtitle}</h3>
                                    </div>

                                    {/* Szyba */}
                                    <div 
                                        className="z-20 relative mx-auto flex flex-col items-center justify-center transition-all duration-300 py-10 px-12 rounded-3xl border-2 shadow-sm"
                                        style={{ 
                                            width: `${boxWidth}%`,
                                            height: `${boxHeight}%`,
                                            transform: `translateY(${boxOffset}px)`, 
                                            backgroundColor: `rgba(255,255,255,${boxOpacity/100})`, 
                                            backdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*12}px)` : 'none',
                                            WebkitBackdropFilter: boxOpacity > 0 ? `blur(${(boxOpacity/100)*12}px)` : 'none',
                                            borderColor: activeTheme.borderHex
                                        }}
                                    >
                                        <h2 style={{ fontSize: `${nameSize}px`, color: diplomaTextColor }} className="font-bold border-b-2 border-gray-300 inline-block px-12 pb-4 mb-6 leading-tight w-full break-words select-none">{studentName}</h2>
                                        <p style={{ fontSize: `${reasonSize}px`, color: diplomaTextColor }} className="font-bold leading-relaxed max-w-2xl select-none">{diplomaReason}</p>
                                    </div>

                                    {/* Stopka */}
                                    <div className="z-20 relative flex justify-between items-end px-12 pb-4 select-none">
                                        <div className="text-center w-64 border-t-2 pt-3" style={{ borderColor: activeTheme.borderHex }}>
                                            <div className="font-bold text-lg mb-1" style={{ color: diplomaTextColor }}>{diplomaDate}</div>
                                            <div className="text-[10px] font-black uppercase opacity-60 tracking-wider" style={{ color: diplomaTextColor }}>Miejscowość i data</div>
                                        </div>
                                        
                                        <div className="w-24 h-24 rounded-full border-4 border-red-500/30 flex items-center justify-center text-red-600 rotate-[-15deg] font-black text-[10px] p-2 bg-white/40 shadow-inner">
                                            PIECZĘĆ<br/>PLACÓWKI
                                        </div>

                                        <div className="text-center w-64 border-t-2 pt-3" style={{ borderColor: activeTheme.borderHex }}>
                                            <div className="font-signature font-bold text-2xl mb-1" style={{ color: diplomaTextColor }}>{diplomaSignature}</div>
                                            <div className="text-[10px] font-black uppercase opacity-60 tracking-wider" style={{ color: diplomaTextColor }}>Podpis Nauczyciela</div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div id="print-area" className="grid grid-cols-1 gap-12 print:block w-full flex flex-col items-center overflow-visible">
                                    {garlandText.split('').map((letter, idx) => (
                                        <div key={idx} className="page-break relative aspect-[0.707] w-full flex items-center justify-center p-4 bg-white shadow-xl print:shadow-none print:w-[210mm] print:h-[297mm]">
                                            <div className="w-full h-full flex items-center justify-center relative">
                                                {renderGarlandShape(letter)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
